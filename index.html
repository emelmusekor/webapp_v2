if(new URLSearchParams(location.search).has('debug'))document.body.classList.add('debugOn');const $=s=>document.querySelector(s),$$=s=>[...document.querySelectorAll(s)],P=[['home','안내'],['q1','1. 번역 확인'],['q2','2. 그림 생성'],['q3','3. 사진 편집'],['q4','4. 동영상 영향'],['q5','5. 공유 점검']],D={q1:()=>({e:[],sub:0,story:'번역 결과가 원래 뜻을 잘 담고 있는지 확인해 보세요.',step:1,score:0,swapped1:0,copied1:0,swapped2:0,word:''}),q2:()=>({e:[],sub:0,story:'상황에 맞는 조건을 골라야 해요.',opts:[],gen:0,sel:''}),q3:()=>({e:[],sub:0,story:'무엇을 지우고 남길지 판단해야 해요.',tool:'',mask:{notice:0,can:0,face:0,sign:0},removed:0,res:'',warm:20,snap:''}),q4:()=>({e:[],sub:0,story:'동영상을 보고 AI 표현의 영향을 생각해 보세요.',ans:[],score:null}),q5:()=>({e:[],sub:0,story:'게시물을 올리기 전 공유 책임을 점검해 보세요.',ans:[],score:null})};let S={q1:D.q1(),q2:D.q2(),q3:D.q3(),q4:D.q4(),q5:D.q5()};function cur(){return location.hash.replace('#/','')||'home'}function nav(){let c=cur();$('#nav').innerHTML=P.map(p=>`<a class="${c==p[0]?'on':''}" href="#/${p[0]}">${p[1]}</a>`).join('')}function log(q,a,st){S[q].e.push(a);if(st)S[q].story=st;draw(q)}function draw(q){let l=$('#log');if(l)l.innerHTML=S[q].e.length?`<ol>${S[q].e.map(x=>`<li>${x}</li>`).join('')}</ol>`:'<div class="empty">아직 누른 행동이 없습니다.</div>';let d=$('#debug');if(d)d.textContent=JSON.stringify(S[q],null,2)}function scoreMulti(arr,good,bad,max){let s=0;good.forEach(x=>{if(arr.includes(x))s++});bad.forEach(x=>{if(arr.includes(x))s--});return Math.max(0,Math.min(max,s))}function submit(q){if(q==='q3')S.q3.snap=`제출 상태: 도구=${S.q3.tool||'없음'}, 결과=${S.q3.res||'없음'}, 따뜻함=${S.q3.warm}`;if(q==='q4')S.q4.score=scoreMulti(S.q4.ans,[2,3,5],[1,4],3);if(q==='q5')S.q5.score=scoreMulti(S.q5.ans,[1,2,3,5],[4],4);S[q].sub=1;log(q,'제출하고 이동하기',q==='q3'?'현재 사진 상태로 제출되었습니다.':'문항이 제출되었습니다.');route()}function reset(q){S[q]=D[q]();route()}function shell(q,t,s,b){main.innerHTML=`<section class="c"><h2>${t}${q==='q1'?` <span class="score">점수 ${S.q1.score}/5</span>`:''}</h2><div class="sub">${s}</div>${b}<div class="msg">💬 ${S[q].story}</ function googleMock(step){let left='한국어',right='스와힐리어',lt='우리 학교에 오신 것을\n환영합니다.',rt='Karibu shuleni kwetu.',lr='uli haggyoe osin geos-eul hwan-yeonghabnida.',rr='';if(step===2){left='스와힐리어';right='한국어';lt='Karibu shuleni\nkwetu.';rt='저희 학교에 오신 것을\n환영합니다.';rr='jeohui haggyoe osin geos-eul hwan-yeonghabnida.'}if(step===3){lt='우리 학교에 오신 것을\n환영합니다. 친구야';rt='Karibu shuleni kwetu,\nrafiki yangu.';lr='uli haggyoe osin geos-eul hwan-yeonghabnida. chinguya.'}return`<div class="gframe"><div class="gTop"><div class="selBox">${left}<span>⌄</span></div><button id="swapBtn" class="swapG">↔</button><div class="selBox">${right}<span>⌄</span></div></div><div class="gPane"><div class="gCol src"><div class="gMain">${lt}<span class="x"> ×</span></div>${lr?`<div class="roman">${lr}</div>`:''}<div class="gBtns"><button class="gIcon">🎙</button><button class="gIcon">🔊</button></div></div><div class="gCol"><div class="gMain">${rt}</div>${rr?`<div class="roman">${rr}</div>`:''}<div class="gBtns"><button id="copyBtn" class="gIcon ${S.q1.copied1?'hit':''}">▣</button><button class="gIcon">🔊</button><button class="gIcon">G</button></div></div></div></div>`}
function q1(){let q=S.q1,b='';if(q.step===1)b=`<div class="talk">지수는 다른 나라 친구들에게 보여 줄 환영 문장을 AI 번역 도구로 스와힐리어로 번역하려고 합니다. 번역 결과가 원래 뜻을 잘 담고 있는지 확인하고, 더 알맞은 스와힐리어 번역을 선택하세요.</div>${googleMock(1)}<div class="talk">“이 번역이 제대로 된 번역인지 알 수가 없네. 다시 한국어로 번역해서 확인하려면 어떤 버튼을 눌러야 하지? 그리고 일단, 스와힐리어 번역을 기록해둘까? 복사해두어야겠다.”</div><div class="box"><h3>답안 선택 방법</h3><div class="item">[언어 전환] 버튼과 [번역 복사] 버튼 클릭</div></div>${q.swapped1&&q.copied1?'<button id="next1" class="btn pri">다음</button>':''}`;else if(q.step===2)b=`${googleMock(2)}<div class="talk">“역번역했더니 ‘우리 학교’가 ‘저희 학교’로 바뀌었네. 이번에는 친구라는 표현을 추가해보자. 한국어로 다시 번역하려면 어떤 버튼을 눌러야 하지?”</div><div class="box"><h3>답안 선택 방법</h3><div class="item">[언어 전환] 버튼 클릭</div></div>${q.swapped2?'<button id="next2" class="btn pri">다음</button>':''}`;else b=`${googleMock(3)}<div class="talk">“친구야를 추가했더니, 뭔가 문장이 바뀌었네. 이 중에 친구라는 표현은 어떤 것일까?”</div><div class="box"><h3>답안 선택 방법</h3><div class="item"><button class="word ${q.word==='Karibu'?'sel':''}" data-word="Karibu">Karibu</button><button class="word ${q.word==='shuleni'?'sel':''}" data-word="shuleni">shuleni</button><button class="word ${q.word==='kwetu'?'sel':''}" data-word="kwetu">kwetu</button><button class="word ${q.word==='rafiki yangu'?'sel':''}" data-word="rafiki yangu">rafiki yangu</button></div></div>`;shell('q1','1단계. AI 번역 결과 확인하기','역번역, 복사, 입력 표현 추가, 단어 선택을 수행합니다.',b);let add=()=>S.q1.score++;if($('#swapBtn'))$('#swapBtn').onclick=()=>{if(q.step===1&&!q.swapped1){q.swapped1=1;add();log('q1','역번역 버튼 선택 +1점','스와힐리어 번역을 다시 한국어로 확인했습니다.');q1()}else if(q.step===2&&!q.swapped2){q.swapped2=1;add();log('q1','한국어로 다시 번역하기 위한 언어 전환 버튼 선택 +1점','친구라는 표현을 추가한 새 문장으로 넘어갈 준비가 되었습니다.');q1()}else log('q1','언어 전환 버튼 클릭','이미 필요한 언어 전환을 했습니다.')};if($('#copyBtn'))$('#copyBtn').onclick=()=>{if(q.step===1&&!q.copied1){q.copied1=1;add();log('q1','번역 복사 버튼 선택 +1점','처음 스와힐리어 번역을 기록해 두었습니다.');q1()}else log('q1','번역 복사 버튼 클릭','이미 복사했습니다.')};if($('#next1'))$('#next1').onclick=()=>{q.step=2;log('q1','다음 화면으로 이동','역번역 결과를 확인합니다.');q1()};if($('#next2'))$('#next2').onclick=()=>{q.step=3;log('q1','친구야 표현 추가 후 다음 화면으로 이동','바뀐 스와힐리어 문장을 확인합니다.');q1()};$$('[data-word]').forEach(b=>b.onclick=()=>{if(!q.word){q.word=b.dataset.word;if(q.word==='rafiki yangu'){add();log('q1','친구 표현 선택: rafiki yangu +1점','친구에 해당하는 표현을 찾았습니다.')}else log('q1','친구 표현 선택: '+q.word,'선택한 단어가 친구 표현인지 확인이 필요합니다.');q1()}})}
function q2(){let q=S.q2,opt=v=>`<button class="chip ${q.opts.includes(v)?'on':''}" data-o="${v}">${v}</button>`,ui=`<div class="img"><div style="background:#fff;border-right:1px solid #d8e0ee;padding:12px"><b>조건</b><div class="prompt">${['환영 앨범 표지 배경',...q.opts].join(', ')}</div><p>${['따뜻한 종이 콜라주','실제 얼굴 없음','글자 없음','정사각형','교실 환영 분위기','큰 국기와 민족 의상 강조','실제 학생 사진처럼'].map(opt).join('')}</p><button id="gen" class="btn pri">그림 생성</button></div><div><div class="bar" style="background:linear-gradient(90deg,#111827,#7c3aed);color:#fff">AI 그림 생성 결과</div>${q.gen?cards(q.sel):'<div class="empty">조건을 고르고 그림 생성 버튼을 누르면 결과가 나타납니다.</div>'}</div></div>`;shell('q2','2단계. 어울리는 그림 생성','조건을 여러 번 선택하고 알맞은 결과를 고릅니다.',`<div class="talk">👧 실제 친구 얼굴이나 읽을 수 있는 글자는 넣지 않고, 따뜻한 교실 분위기의 배경 그림이면 좋겠어.</div>${ui}`);$$('[data-o]').forEach(b=>b.onclick=()=>{let v=b.dataset.o;q.opts=q.opts.includes(v)?q.opts.filter(x=>x!==v):[...q.opts,v];log('q2','조건 선택: '+v,'조건을 선택했습니다. 목표와 맞는지 판단해야 합니다.');q2()});$('#gen').onclick=()=>{q.gen=1;log('q2','그림 생성 버튼 누르기','그림 후보가 만들어졌습니다.');q2()};$$('[data-card]').forEach(c=>c.onclick=()=>{q.sel=c.dataset.card;log('q2','생성 결과 '+q.sel+' 선택',q.sel==='2'?'목표에 가장 가까운 그림을 골랐습니다.':'조건과 맞는지 다시 살펴봐야 합니다.');q2()})}function cards(sel){return`<div class="cards"><div class="card ${sel==='1'?'sel':''}" data-card="1"><div class="art"><svg viewBox="0 0 200 140"><rect width="200" height="140" fill="#dbeafe"/><circle cx="58" cy="60" r="22" fill="#f8c7a5"/><text x="85" y="72" fill="#ef4444">WELC0M</text></svg></div><div class="cap">얼굴이 있고 글자가 깨져 보임</div></div><div class="card ${sel==='2'?'sel':''}" data-card="2"><div class="art"><svg viewBox="0 0 200 140"><rect width="200" height="140" fill="#fff7ed"/><circle cx="45" cy="45" r="24" fill="#fde68a"/><rect x="80" y="42" width="78" height="52" rx="12" fill="#bfdbfe"/></svg></div><div class="cap">글자·실제 얼굴 없이 따뜻한 교실 배경</div></div><div class="card ${sel==='3'?'sel':''}" data-card="3"><div class="art"><svg viewBox="0 0 200 140"><rect width="200" height="140" fill="#dcfce7"/><rect x="16" y="18" width="168" height="48" fill="#ef4444"/><rect x="16" y="66" width="168" height="48" fill="#2563eb"/></svg></div><div class="cap">큰 국기 느낌이 강함</div></div></div>`}
function q3(){let q=S.q3,w=q.warm/100,rm=q.res==='r3'?'removed':'',rem=q.tool==='remove'?'<button id="rem" class="btn pri">제거</button><p class="hint">브러시로 없앨 영역을 선택합니다.</p>':'',res=q.removed?`<button class="res ${q.res==='r1'?'sel':''}" data-r="r1">결과 1 · 얼굴이 어색함</button><button class="res ${q.res==='r2'?'sel':''}" data-r="r2">결과 2 · 캔이 남아 있음</button><button class="res ${q.res==='r3'?'sel':''}" data-r="r3">결과 3 · 전화번호와 캔이 사라지고 얼굴과 카드는 유지됨</button><button id="keep" class="btn pri">유지</button>`:'',adj=q.tool==='adjust'?`<div class="warm"></div><input id="warm" type="range" min="0" max="100" value="${q.warm}"><button id="adj" class="btn pri">적용</button>`:'';let ui=`<div class="ad"><div><div class="bar dark">Adobe Express <span>다운로드</span></div><div class="stage"><div id="photo" class="photo" style="--w:${w}"><div class="ov"></div><div id="face" class="person ${q.mask.face?'masked':''}"></div><div id="sign" class="sign ${q.mask.sign?'masked':''}">WELCOME</div><div id="notice" class="notice ${q.mask.notice?'masked':''} ${rm}">연락처<br>010-1234</div><div id="can" class="can ${q.mask.can?'masked':''} ${rm}"></div></div></div></div><div class="panel"><b>이미지</b><div class="tool"><button data-t="crop" class="btn">자르기</button><button data-t="adjust" class="btn">조정</button><button data-t="removeBg" class="btn">배경 제거</button><button data-t="remove" class="btn">개체 제거</button></div>${rem}${res}${adj}${q.snap?`<div class="snap">${q.snap}</div>`:''}</div></div>`;shell('q3','3단계. 현재 사진 상태로 제출','조정하면 사진이 실제로 바뀌고 제출 시 현재 상태가 저장됩니다.',`<div class="talk">🧑 전화번호 안내문과 캔만 없애고, 친구 얼굴과 환영 카드는 그대로 두고 싶어. 분위기도 따뜻하게 보이면 좋겠어.</div>${ui}`);$$('[data-t]').forEach(b=>b.onclick=()=>{q.tool=b.dataset.t;log('q3','도구 선택: '+b.textContent,b.dataset.t==='adjust'?'따뜻함을 바꾸면 사진 색감이 실제로 바뀝니다.':b.dataset.t==='remove'?'개체 제거 도구를 열었습니다.':'도구를 선택했습니다.');q3()});['notice','can','face','sign'].forEach(id=>$('#'+id).onclick=e=>{e.stopPropagation();if(q.tool==='remove'){q.mask[id]=!q.mask[id];log('q3','영역 선택: '+id,id==='notice'||id==='can'?'없애야 할 방해 요소를 선택했습니다.':'보존해야 할 영역을 선택했습니다.')}else log('q3','도구 없이 영역 클릭: '+id,'먼저 편집 도구를 골라야 합니다.');q3()});if($('#rem'))$('#rem').onclick=()=>{q.removed=1;log('q3','제거 버튼 누르기','제거 결과 후보가 나타났습니다.');q3()};$$('[data-r]').forEach(b=>b.onclick=()=>{q.res=b.dataset.r;log('q3','결과 선택: '+q.res,q.res==='r3'?'전화번호와 캔이 사라진 결과입니다.':'결과를 선택했습니다.');q3()});if($('#keep'))$('#keep').onclick=()=>log('q3','유지 버튼 누르기','선택한 제거 결과를 현재 사진 상태로 유지했습니다.');if($('#warm'))$('#warm').oninput=e=>{q.warm=+e.target.value;$('#photo').style.setProperty('--w',q.warm/100);log('q3','따뜻함 조정: '+q.warm,'사진 색감이 실제로 바뀌었습니다.')};if($('#adj'))$('#adj').onclick=()=>log('q3','조정 적용','현재 색감 상태가 적용되었습니다.')}
function choices(q,items){return items.map(([n,t])=>`<label class="choice ${S[q].ans.includes(n)?'sel':''}"><input type="checkbox" data-q="${q}" value="${n}" ${S[q].ans.includes(n)?'checked':''}><span>${n}. ${t}</span></label>`).join('')}function bindChecks(q){$$(`[data-q=${q}]`).forEach(x=>x.onchange=e=>{let n=+e.target.value;if(e.target.checked&&!S[q].ans.includes(n))S[q].ans.push(n);if(!e.target.checked)S[q].ans=S[q].ans.filter(v=>v!==n);log(q,(e.target.checked?'선택: ':'해제: ')+n,'선택한 항목이 기록되었습니다.');route()})}
function q4(){let items=[[1,'AI가 만든 영상은 항상 정확하므로 그대로 사용해도 된다.'],[2,'특정 나라나 문화를 한 가지 모습으로만 표현하면 친구들이 그 문화를 단순하게 이해할 수 있다.'],[3,'AI 영상이 친구나 문화의 모습을 어색하게 표현하면 교류 친구가 불편하게 느낄 수 있다.'],[4,'AI가 만든 영상은 사람이 만든 자료가 아니므로 교류 활동이나 친구 관계에 영향을 주지 않는다.'],[5,'여러 문화와 친구의 모습을 존중하는 표현인지 확인해야 한다.']];let ui=`<div class="yt"><div class="ytTop"><div class="ytLogo"><span>▶</span>YouTube</div><input style="flex:1;border:1px solid #ddd;border-radius:999px;padding:9px" value="우리 반 교류 활동 동영상" readonly><button class="btn">검색</button></div><div class="ytMain"><div><div class="player"><div class="vidScene"><i></i><i></i><i></i></div><div class="play">▶</div><div class="progress"><b></b></div></div><div class="ytTitle">AI로 만든 우리 반 교류 활동 소개 영상</div><div class="small">조회수 128회 · AI 생성 영상 · 공개 전 검토 중</div><div class="comment"><div class="ava"></div><div><b>지수</b><br>친구들이 이 영상을 보면 어떤 생각을 할까?</div></div><div class="comment"><div class="ava"></div><div><b>민재</b><br>나라와 문화를 너무 한 가지 모습으로만 보여 주는 건 아닐까?</div></div></div><div><div class="thumb"></div><div class="qpanel"><h3>AI가 만든 교류 활동 영상을 사용할 때 생각해야 할 영향으로 알맞은 것을 모두 고르세요.</h3>${choices('q4',items)}</div></div></div></div>`;shell('q4','4단계. 교류 활동 동영상 영향 판단','YouTube형 화면에서 AI 동영상의 사회적 영향을 복수 선택합니다.',ui);bindChecks('q4')}
function q5(){let items=[[1,'친구 사진을 사용해도 되는지 동의를 확인한다.'],[2,'사진이나 자료에 전화번호, 이름표 등 개인정보가 보이지 않는지 확인한다.'],[3,'AI로 만든 그림이 포함되어 있음을 표시한다.'],[4,'자료를 빨리 보여 주기 위해 먼저 전체 공개로 공유한다.'],[5,'필요한 사람만 볼 수 있도록 공유 범위를 설정한다.']];let ui=`<div class="ig"><div class="igTop"><div class="igLogo">Instagram</div><button class="btn pri">공유</button></div><div class="igMain"><div class="igPost"><div class="igCard"><div class="igHead"><div class="ava"></div><span>seokjeong_class</span></div><div class="igPic"><div class="igFace"></div><div class="igImg"></div></div><div class="igCaption"><b>seokjeong_class</b> 다른 나라 친구들을 위한 우리 반 교류 활동 자료입니다. Karibu shuleni kwetu, rafiki yangu.</div></div></div><div class="igPanel"><h3>새 게시물 공유 전 설정</h3><div class="igSetting"><span>공유 범위</span><span class="badgeBad">전체 공개</span></div><div class="igSetting"><span>AI 생성 표시</span><span class="badgeBad">없음</span></div><div class="igSetting"><span>친구 사진 동의</span><span class="badgeBad">확인 필요</span></div><div class="igSetting"><span>개인정보 점검</span><span class="badgeBad">확인 필요</span></div><div class="qpanel"><h3>온라인으로 공유하기 전에 해야 할 행동으로 알맞은 것을 모두 고르세요.</h3>${choices('q5',items)}</div></div></div></div>`;shell('q5','5단계. Instagram 공유 전 윤리 점검','Instagram형 공유 화면에서 동의, 개인정보, AI 표시, 공유 범위를 복수 선택합니다.',ui);bindChecks('q5')}
function route(){nav();let c=cur();if(c==='q1')q1();else if(c==='q2')q2();else if(c==='q3')q3();else if(c==='q4')q4();else if(c==='q5')q5();else home()}$('#all').onclick=()=>{S={q1:D.q1(),q2:D.q2(),q3:D.q3(),q4:D.q4(),q5:D.q5()};route()};addEventListener('hashchange',route);route();</script></body></html>
