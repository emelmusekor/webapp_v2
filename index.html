<html lang="ko">
<head>

<style>
:root{--bg:#eef2f7;--ink:#111827;--muted:#667085;--line:#d8e0ee;--blue:#2563eb;--purple:#7c3aed;--panel:#fff;--soft:#f8fafc;--shadow:0 18px 45px rgba(15,23,42,.12)}
*{box-sizing:border-box}body{margin:0;background:linear-gradient(180deg,#e8eef9,#f8fafc);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif;color:var(--ink)}button,input,textarea{font:inherit}button{cursor:pointer}.wrap{max-width:1320px;margin:auto;padding:20px;display:grid;grid-template-columns:260px 1fr;gap:18px}.side,.card,.app{background:rgba(255,255,255,.98);border:1px solid var(--line);border-radius:22px;box-shadow:var(--shadow)}.side{position:sticky;top:18px;height:calc(100vh - 36px);padding:16px;overflow:auto}.brand{display:flex;gap:10px;align-items:center;border-bottom:1px solid #e5e7eb;padding-bottom:12px}.logo{width:40px;height:40px;border-radius:13px;background:linear-gradient(135deg,#2563eb,#7c3aed);color:#fff;display:grid;place-items:center;font-weight:900}.brand h1{font-size:16px;margin:0}.brand p{font-size:12px;color:var(--muted);margin:2px 0 0}.hint{font-size:13px;color:#475467;line-height:1.55;background:#f8fafc;border:1px solid #e5e7eb;border-radius:14px;padding:11px;margin:12px 0}.nav{display:grid;gap:8px}.nav a{display:grid;grid-template-columns:30px 1fr;gap:9px;align-items:center;text-decoration:none;color:var(--ink);font-weight:850;border:1px solid transparent;border-radius:14px;padding:9px}.nav a:hover{background:#f8fbff;border-color:#cfe0ff}.nav a.on{background:#eff6ff;border-color:#2563eb;color:#1d4ed8}.no{width:30px;height:30px;border-radius:10px;background:#eaf2ff;color:#1d4ed8;display:grid;place-items:center;font-weight:900}.tools{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}.card{padding:20px;margin-bottom:16px}.card h2{margin:0 0 6px;font-size:23px;letter-spacing:-.04em}.sub{font-size:14px;color:var(--muted)}.talk{display:flex;gap:12px;align-items:flex-start;background:#f6f9ff;border:1px solid #d7e5ff;border-radius:16px;padding:13px;margin:14px 0}.av{width:42px;height:42px;border-radius:14px;background:#dbeafe;display:grid;place-items:center;font-size:22px;flex:0 0 auto}.btn{border:1px solid #cbd5e1;background:#fff;color:#111827;border-radius:11px;padding:8px 11px;font-weight:850}.btn:hover{background:#f8fbff;border-color:#93b4ed}.btn.primary{background:var(--blue);border-color:var(--blue);color:#fff}.btn.danger{background:#fff7ed;border-color:#fdba74;color:#9a3412}.actions{display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap;margin-top:14px}.debug{display:none;margin-top:14px;background:#0f172a;color:#dbeafe;border-radius:14px;padding:12px;white-space:pre-wrap;font:12px ui-monospace,SFMono-Regular,Menlo,monospace}.debugOn .debug{display:block}.grid2{display:grid;grid-template-columns:1.1fr .9fr;gap:14px}.app{overflow:hidden}.appbar{height:48px;background:#f1f5f9;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px;padding:0 13px}.dots{display:flex;gap:5px}.dots i{width:10px;height:10px;border-radius:50%;display:block}.dots i:nth-child(1){background:#ff5f57}.dots i:nth-child(2){background:#ffbd2e}.dots i:nth-child(3){background:#28c840}.appname{font-weight:900;color:#475569}.appbody{padding:15px}.mini{font-size:12px;color:var(--muted)}.panelTitle{font-size:12px;font-weight:900;color:#475569;text-transform:uppercase;letter-spacing:.05em;margin:0 0 8px}.box{border:1px solid var(--line);border-radius:14px;overflow:hidden;background:#fff;margin-bottom:10px}.box h3{margin:0;padding:9px 11px;background:#f8fafc;border-bottom:1px solid #e5e7eb;font-size:13px}.item,.box label{display:block;padding:9px 11px;border-bottom:1px solid #eef2f7;font-size:13px}.item:last-child,.box label:last-child{border-bottom:0}.chip{display:inline-flex;align-items:center;border:1px solid #cfe0ff;background:#eff6ff;color:#1d4ed8;border-radius:99px;padding:4px 9px;font-size:12px;font-weight:850;margin:2px}
.gtShell{border:1px solid var(--line);border-radius:18px;overflow:hidden;background:#fff}.gtTop{height:54px;display:grid;grid-template-columns:1fr 56px 1fr;align-items:center;border-bottom:1px solid #e5e7eb}.lang{text-align:center;font-weight:900;color:#1d4ed8}.swap{width:42px;height:42px;border-radius:50%;border:1px solid #cbd5e1;background:#fff;font-size:21px;color:#2563eb}.swap:hover{background:#eff6ff}.gtPanes{display:grid;grid-template-columns:1fr 1fr}.gtPane{min-height:185px;padding:13px;display:flex;flex-direction:column}.gtPane+.gtPane{border-left:1px solid #e5e7eb}.gtPane textarea{border:0;outline:0;resize:vertical;min-height:112px;font-size:16px;line-height:1.55}.out{font-size:16px;line-height:1.55;white-space:pre-wrap;min-height:112px}.gtTools{border-top:1px solid #eef2f7;padding-top:9px;display:flex;gap:7px}.memo textarea{width:100%;min-height:145px;border:0;outline:0;resize:vertical;padding:12px;background:#fffdf6}.history{max-height:220px;overflow:auto}
.canvaShell{border:1px solid var(--line);border-radius:18px;overflow:hidden;background:#f6f7fb}.canvaTop{height:46px;background:linear-gradient(90deg,#00c4cc,#7d2ae8);color:#fff;display:flex;align-items:center;justify-content:space-between;padding:0 13px;font-weight:900}.canvaMain{display:grid;grid-template-columns:72px 1fr 296px;min-height:520px}.rail{background:#111827;color:#dbeafe;padding:10px 7px;display:grid;align-content:start;gap:8px}.rail button{border:0;background:transparent;color:inherit;border-radius:12px;padding:8px 3px;font-size:12px}.rail button.on,.rail button:hover{background:#1f2937}.canvasArea{display:grid;align-content:center;justify-content:center;padding:22px}.toolbar{height:44px;background:#fff;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:8px;padding:0 10px}.poster{width:370px;height:370px;border-radius:26px;background:linear-gradient(145deg,#dbeafe,#fff7ed);box-shadow:0 16px 35px rgba(15,23,42,.18);position:relative}.photoMock{position:absolute;inset:25px 25px 120px;border-radius:18px;background:linear-gradient(135deg,#bfdbfe,#fde68a)}.textBox{position:absolute;left:28px;right:28px;bottom:28px;background:rgba(255,255,255,.9);border:2px solid transparent;border-radius:15px;padding:12px;text-align:center;font-weight:900}.textBox.sel{border-color:#7c3aed;outline:3px solid rgba(124,58,237,.17)}.canvaPanel{background:#fff;border-left:1px solid var(--line);padding:13px}.menu{border:1px solid #e5e7eb;border-radius:14px;overflow:hidden;margin:9px 0}.menu button{display:block;width:100%;text-align:left;border:0;background:#fff;border-bottom:1px solid #eef2f7;padding:10px 12px}.menu button:hover{background:#f8fbff}.preview{border:1px solid #d7e5ff;background:#f6f9ff;border-radius:14px;padding:12px;margin-top:10px}
.adobeShell{border:1px solid var(--line);border-radius:18px;overflow:hidden;background:#e9edf5}.adobeTop{height:46px;background:#111827;color:#fff;display:flex;justify-content:space-between;align-items:center;padding:0 14px;font-weight:900}.adobeMain{display:grid;grid-template-columns:1fr 310px;min-height:540px}.adobeStage{display:grid;place-items:center;padding:24px}.photo2{width:540px;height:360px;border:8px solid #fff;border-radius:24px;position:relative;background:linear-gradient(#bfdbfe 0 45%,#bbf7d0 46%);box-shadow:0 18px 40px rgba(15,23,42,.2)}.person{position:absolute;left:150px;bottom:66px;width:72px;height:122px;background:#60a5fa;border-radius:36px 36px 18px 18px}.person:before{content:"";position:absolute;width:48px;height:48px;border-radius:50%;background:#f8c7a5;left:12px;top:-30px}.sign{position:absolute;left:175px;right:125px;bottom:30px;height:48px;background:white;border:3px solid #f59e0b;border-radius:12px;display:grid;place-items:center;font-weight:900}.notice{position:absolute;right:42px;top:62px;background:white;border:3px solid #ef4444;border-radius:10px;padding:8px;font-weight:900;font-size:12px}.can{position:absolute;left:58px;bottom:34px;width:31px;height:44px;background:#ef4444;border:3px solid #fff;border-radius:8px}.maskable{cursor:crosshair}.masked{outline:5px solid #2563eb;box-shadow:0 0 0 10px rgba(37,99,235,.18)}.adobePanel{background:#fff;border-left:1px solid var(--line);padding:13px}.toolGrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}.toolGrid button{min-height:44px}.result{display:block;width:100%;border:1px solid #d8e0ee;background:white;border-radius:12px;text-align:left;padding:10px;margin:8px 0}.result.on{border-color:#2563eb;outline:3px solid rgba(37,99,235,.15)}.warm{height:18px;border-radius:99px;background:linear-gradient(90deg,#bfdbfe,#fff7ed,#fed7aa);margin:9px 0}
@media(max-width:1000px){.wrap,.grid2,.canvaMain,.adobeMain,.gtPanes{grid-template-columns:1fr}.side{position:relative;height:auto}.canvaPanel,.adobePanel,.gtPane+.gtPane{border-left:0}.poster,.photo2{width:100%;max-width:540px}.canvaMain{min-height:auto}.rail{display:flex}.adobeMain{min-height:auto}}
</style>
</head><body><div class="wrap"><aside class="side"><div class="brand"><div class="logo">AI</div><div><h1>AI 도구 기능형</h1><p>실제 기능 조작 샘플</p></div></div><div class="hint">대화 속 목표를 파악하고 실제 앱 화면의 기능을 찾아 조작합니다. 각 단계 초기화가 가능합니다. 로그는 <b>?debug=1</b>에서만 보입니다.</div><nav id="nav" class="nav"></nav><div class="tools"><button id="resetAll" class="btn danger">전체 초기화</button></div></aside><main id="main"></main></div>
<script>
const defaults={q1:()=>({e:[],dir:'ko',src:'우리 학교에서 함께 만든 추억을 오래 간직해요.',memo:'',hist:[],clip:''}),q2:()=>({e:[],sel:0,menu:0,voice:0,text:'우리 학교에 온 거 완전 신기하고 대박이야! 다 같이 엄청 재밌게 놀자!!!',pre:''}),q3:()=>({e:[],tool:'',mask:{notice:0,can:0,face:0,sign:0},removed:0,result:'',adjust:0})};
const S={q1:defaults.q1(),q2:defaults.q2(),q3:defaults.q3()};const pages=[['home','안내'],['q1','Google 번역'],['q2','Canva'],['q3','Adobe Express']];const $=s=>document.querySelector(s);const $$=s=>[...document.querySelectorAll(s)];if(new URLSearchParams(location.search).has('debug'))document.body.classList.add('debugOn');
function cur(){return location.hash.replace('#/','')||'home'}function nav(){let c=cur();$('#nav').innerHTML=pages.map((p,i)=>`<a class="${c==p[0]?'on':''}" href="#/${p[0]}"><span class="no">${i||''}</span><span>${p[1]}</span></a>`).join('')}function log(q,e){S[q].e.push(e);dbg(q)}function dbg(q){let d=$('#dbg');if(d)d.textContent=JSON.stringify(S[q],null,2)}function resetStep(q){S[q]=defaults[q]();route()}function resetAll(){S.q1=defaults.q1();S.q2=defaults.q2();S.q3=defaults.q3();route()}function shell(q,title,sub,body){$('#main').innerHTML=`<section class="card"><h2>${title}</h2><div class="sub">${sub}</div>${body}<pre id="dbg" class="debug"></pre><div class="actions"><span><a class="btn" href="#/home">안내로</a> <button id="resetStep" class="btn danger">이 단계 초기화</button></span><button id="submit" class="btn primary">이 문항 제출</button></div></section>`;$('#resetStep').onclick=()=>resetStep(q);$('#submit').onclick=()=>log(q,'submit');dbg(q)}function app(n,b,cls=''){return `<div class="app ${cls}"><div class="appbar"><span class="dots"><i></i><i></i><i></i></span><span class="appname">${n}</span></div><div class="appbody">${b}</div></div>`}
function home(){$('#main').innerHTML=`<section class="card"><h1>기능형 3문항 샘플</h1><p class="sub">학생은 캐릭터의 말에서 목표를 파악하고, 실제 도구의 기능을 찾아 조작합니다. 오답 피드백은 학생 화면에 표시하지 않습니다.</p><div class="grid2"><div class="talk"><div class="av">🧒</div><div><b>대화 속 목표 파악</b><br>버튼명을 직접 말하지 않고 의도만 제시합니다.</div></div><div class="talk"><div class="av">🧰</div><div><b>기능 조작 로그 채점</b><br>버튼·메뉴·입력창·영역 선택 순서를 기록합니다.</div></div></div><p><a class="btn primary" href="#/q1">1번 시작</a> <a class="btn primary" href="#/q2">2번 시작</a> <a class="btn primary" href="#/q3">3번 시작</a></p></section>`}
function tr(){let q=S.q1;if(q.src.includes('기억'))return ['Tukumbuke kumbukumbu tulizotengeneza pamoja shuleni kwetu.','우리 학교에서 함께 만든 추억을 기억해요.'];if(q.src.includes('오래')||q.src.includes('간직'))return ['Tuhifadhi kumbukumbu tulizotengeneza pamoja shuleni kwetu kwa muda mrefu.','우리 학교에서 만든 기억을 오랫동안 보관합시다.'];return ['Karibu shuleni kwetu.','우리 학교에 오신 것을 환영합니다.']}
function q1(){let q=S.q1,a=tr(),ko=q.dir=='ko',left=ko?'한국어':'스와힐리어',right=ko?'스와힐리어':'한국어',inp=ko?q.src:a[0],out=ko?a[0]:a[1],hist=q.hist.length?q.hist.map((h,i)=>`<div class="item"><b>${i+1}. ${h.d}</b><br>${h.t}</div>`).join(''):'<div class="item muted">기록 없음</div>',fin=q.hist.length?q.hist.map((h,i)=>`<label><input type="radio" name="final" value="${i}"> ${h.t}</label>`).join(''):'<div class="item muted">기록이 생기면 선택합니다.</div>';
let gt=`<div class="gtShell"><div class="gtTop"><div class="lang">${left}</div><button id="swap" class="swap" title="언어 전환">⇄</button><div class="lang">${right}</div></div><div class="gtPanes"><div class="gtPane"><p class="panelTitle">입력</p><textarea id="src">${inp}</textarea></div><div class="gtPane"><p class="panelTitle">번역 결과</p><div id="out" class="out">${out}</div><div class="gtTools"><button id="copy" class="btn">복사</button><button id="save" class="btn">저장</button></div></div></div></div><div class="box history"><h3>최근 번역</h3>${hist}</div>`;
let memo=`<div class="box memo"><h3>메모장</h3><textarea id="memo">${q.memo}</textarea><div style="padding:8px"><button id="paste" class="btn">붙여넣기</button></div></div><div class="box"><h3>최종 번역 선택</h3>${fin}</div>`;
shell('q1','Google 번역으로 번역 검증','스와힐리어 번역을 다시 한국어로 확인하고, 비교 기록을 남기는 기능 사용을 평가합니다.',`<div class="talk"><div class="av">🧒</div><div>스와힐리어 번역이 맞는지 모르겠어. 나중에 어떤 번역을 쓸지 비교할 수 있게 확인한 내용을 남겨두면 좋겠어.</div></div><div class="grid2">${app('Google 번역',gt)}${app('메모와 최종 선택',memo)}</div>`);$('#src').oninput=e=>{if(S.q1.dir=='ko'){S.q1.src=e.target.value;$('#out').textContent=tr()[0]}log('q1','edit_source')};$('#swap').onclick=()=>{let p=tr();S.q1.dir=S.q1.dir=='ko'?'sw':'ko';S.q1.hist.push({d:S.q1.dir=='sw'?'스와힐리어→한국어':'한국어→스와힐리어',t:S.q1.dir=='sw'?p[1]:p[0]});log('q1','swap_language');q1()};$('#copy').onclick=()=>{S.q1.clip=$('#out').textContent;log('q1','copy_translation')};$('#save').onclick=()=>log('q1','save_translation');$('#memo').oninput=e=>{S.q1.memo=e.target.value;log('q1','edit_memo')};$('#paste').onclick=()=>{if(S.q1.clip){S.q1.memo+=(S.q1.memo?'\n':'')+S.q1.clip;log('q1','paste_to_memo');q1()}else log('q1','paste_empty')};$$('input[name=final]').forEach(x=>x.onchange=()=>log('q1','select_final'))}
function q2(){let q=S.q2,menu=q.menu?`<div class="menu"><button id="rewrite">다시 쓰기</button><button id="short">짧게</button><button id="voice">문체 바꾸기</button><button id="fix">맞춤법 고치기</button></div>`:'',voice=q.voice?`<div class="menu"><button id="formal">더 격식 있게</button><button id="friendly">더 친근하게</button><button id="fun">더 재미있게</button></div>`:'',pre=q.pre?`<div class="preview"><b>미리보기</b><br>${q.pre}<p><button id="apply" class="btn primary">적용</button></p></div>`:'';
let canva=`<div class="canvaShell"><div class="canvaTop"><span>Canva</span><span>공유</span></div><div class="toolbar"><button class="btn">글꼴</button><button class="btn">크기</button><button id="magicTop" class="btn">마법 글쓰기</button></div><div class="canvaMain"><div class="rail"><button class="on">디자인</button><button>요소</button><button>텍스트</button><button>앱</button></div><div class="canvasArea"><div class="poster"><div class="photoMock"></div><div id="txt" class="textBox ${q.sel?'sel':''}">${q.text}</div></div></div><div class="canvaPanel"><p class="panelTitle">텍스트 도구</p><button id="magicPanel" class="btn">마법 글쓰기</button>${menu}${voice}${pre}</div></div></div>`;
shell('q2','Canva에서 카드 문구 다듬기','기존 텍스트를 선택하고 AI 글쓰기 기능으로 문체와 길이를 조정하는지를 평가합니다.',`<div class="talk"><div class="av">👧</div><div>카드 문구가 너무 길고 장난스러워 보여. 해외 교류 친구와 선생님도 함께 볼 카드라서 더 공손하고 짧게 고치고 싶어.</div></div>${canva}`);$('#txt').onclick=()=>{S.q2.sel=1;log('q2','select_text');q2()};$('#magicTop').onclick=$('#magicPanel').onclick=()=>{S.q2.menu=1;log('q2','open_magic_write');q2()};let b=id=>$('#'+id);if(b('voice'))b('voice').onclick=()=>{S.q2.voice=1;log('q2','change_voice');q2()};if(b('formal'))b('formal').onclick=()=>{S.q2.pre='우리 학교에 온 것을 진심으로 환영해요. 함께 좋은 추억을 만들어요.';log('q2','more_formal');q2()};if(b('short'))b('short').onclick=()=>{S.q2.pre='우리 학교에 온 것을 환영해요. 함께 좋은 추억을 만들어요.';log('q2','shorten');q2()};if(b('rewrite'))b('rewrite').onclick=()=>{S.q2.pre='우리 학교에 와 줘서 고마워요. 즐거운 시간을 보내요.';log('q2','rewrite') ;q2()};if(b('fix'))b('fix').onclick=()=>{S.q2.pre=S.q2.text.replace('!!!','!');log('q2','fix_spelling');q2()};if(b('friendly'))b('friendly').onclick=()=>{S.q2.pre='우리 학교에 와 줘서 반가워요. 함께 추억을 만들어요.';log('q2','friendly');q2()};if(b('fun'))b('fun').onclick=()=>{S.q2.pre='환영 파티 시작! 신나게 추억을 만들어요!';log('q2','fun');q2()};if(b('apply'))b('apply').onclick=()=>{S.q2.text=S.q2.pre;log('q2','apply_text');q2()}}
function q3(){let q=S.q3,remove=q.tool=='remove'?'<button id="remove" class="btn primary">제거</button><p class="mini">브러시로 없앨 영역을 선택합니다.</p>':'',res=q.removed?`<div class="results"><button class="result ${q.result=='r1'?'on':''}" data-r="r1">결과 1 · 얼굴이 어색함</button><button class="result ${q.result=='r2'?'on':''}" data-r="r2">결과 2 · 캔이 남아 있음</button><button class="result ${q.result=='r3'?'on':''}" data-r="r3">결과 3 · 전화번호와 캔이 사라지고 얼굴과 카드는 유지됨</button></div><button id="keep" class="btn primary">유지</button>`:'',adj=q.tool=='adjust'?'<div class="warm"></div><input id="warm" type="range" min="0" max="100" value="60"><button id="adj" class="btn primary">적용</button>':'';
let adobe=`<div class="adobeShell"><div class="adobeTop"><span>Adobe Express</span><span>다운로드</span></div><div class="adobeMain"><div class="adobeStage"><div class="photo2"><div id="face" class="person maskable ${q.mask.face?'masked':''}"></div><div id="sign" class="sign maskable ${q.mask.sign?'masked':''}">WELCOME</div><div id="notice" class="notice maskable ${q.mask.notice?'masked':''}">연락처<br>010-1234-5678</div><div id="can" class="can maskable ${q.mask.can?'masked':''}"></div></div></div><div class="adobePanel"><p class="panelTitle">이미지</p><div class="toolGrid"><button class="btn" data-t="crop">자르기</button><button class="btn" data-t="adjust">조정</button><button class="btn" data-t="removeBg">배경 제거</button><button class="btn" data-t="remove">개체 제거</button></div>${remove}${res}${adj}</div></div></div>`;
shell('q3','Adobe Express에서 사진 편집하기','AI 개체 제거와 이미지 조정 기능을 찾아 필요한 영역만 선택하는지를 평가합니다.',`<div class="talk"><div class="av">🧑</div><div>전화번호 안내문과 캔만 없애고, 친구 얼굴과 환영 카드는 그대로 두고 싶어. 사진 분위기도 조금 따뜻하게 보이면 좋겠어.</div></div>${adobe}`);$$('[data-t]').forEach(x=>x.onclick=()=>{S.q3.tool=x.dataset.t;log('q3','select_tool_'+x.dataset.t);q3()});['notice','can','face','sign'].forEach(id=>$('#'+id).onclick=e=>{e.stopPropagation();if(S.q3.tool=='remove'){S.q3.mask[id]=!S.q3.mask[id];log('q3','mask_'+id);q3()}else log('q3','click_region_without_remove_tool_'+id)});if($('#remove'))$('#remove').onclick=()=>{S.q3.removed=1;log('q3','remove_clicked');q3()};$$('[data-r]').forEach(x=>x.onclick=()=>{S.q3.result=x.dataset.r;log('q3','select_result_'+x.dataset.r);q3()});if($('#keep'))$('#keep').onclick=()=>log('q3','keep_result');if($('#warm'))$('#warm').oninput=()=>{S.q3.adjust=1;log('q3','adjust_warmth')};if($('#adj'))$('#adj').onclick=()=>log('q3','apply_adjustment')}
function route(){nav();let c=cur();if(c=='q1')q1();else if(c=='q2')q2();else if(c=='q3')q3();else home()}$('#resetAll').onclick=resetAll;addEventListener('hashchange',route);route();
