<!doctype html><html lang='ko'><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>AI 도구 기능형</title><style>*{box-sizing:border-box}body{margin:0;background:#eef2f7;font-family:system-ui,Noto Sans KR,sans-serif;color:#111827}.wrap{max-width:1180px;margin:auto;padding:18px;display:grid;grid-template-columns:220px 1fr;gap:16px}.side,.box{background:#fff;border:1px solid #d8e0ee;border-radius:18px;box-shadow:0 10px 28px #0f172a18}.side{padding:14px}.nav a{display:block;padding:10px;margin:8px 0;border:1px solid #e5e7eb;border-radius:12px;text-decoration:none;color:#111827;font-weight:800}.nav a.on{background:#eff6ff;border-color:#2563eb;color:#1d4ed8}.box{padding:18px;margin-bottom:14px}.chat{background:#f6f9ff;border:1px solid #d7e5ff;border-radius:14px;padding:12px;margin:12px 0}.btn{border:1px solid #cbd5e1;background:white;border-radius:10px;padding:8px 10px;font-weight:800;cursor:pointer}.btn:hover{background:#f8fbff}.pri{background:#2563eb;color:white;border-color:#2563eb}.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.dev{border:1px solid #d8e0ee;border-radius:14px;overflow:hidden;background:white}.bar{background:#f1f5f9;border-bottom:1px solid #d8e0ee;padding:10px;font-weight:900}.body{padding:12px}.debug{display:none;background:#0f172a;color:#dbeafe;border-radius:12px;padding:10px;white-space:pre-wrap;font:12px monospace}.dbg .debug{display:block}.langs{text-align:center;border-bottom:1px solid #e5e7eb;padding:8px}.swap{border-radius:50%;width:40px;height:40px;font-size:20px}.panes{display:grid;grid-template-columns:1fr 1fr}.pane{padding:10px;min-height:145px}.pane+.pane{border-left:1px solid #e5e7eb}textarea{width:100%;min-height:95px;border:0;outline:0;resize:none;font:16px inherit}.out{font-size:16px}.memo,.hist,.final{border:1px solid #d8e0ee;border-radius:12px;overflow:hidden;margin-bottom:10px}.memo h3,.hist h3,.final h3{margin:0;background:#f8fafc;border-bottom:1px solid #e5e7eb;padding:8px;font-size:13px}.item,.final label{display:block;padding:8px;border-bottom:1px solid #eef2f7;font-size:13px}.memo textarea{background:#fffdf6}.canva,.adobe{display:grid;grid-template-columns:1fr 260px;gap:0;border:1px solid #d8e0ee;border-radius:14px;overflow:hidden}.poster,.photo{height:300px;margin:18px;border-radius:20px;position:relative;background:linear-gradient(135deg,#dbeafe,#fff7ed);box-shadow:0 10px 25px #0f172a20}.cardtext{position:absolute;left:24px;right:24px;bottom:24px;background:#ffffffdd;border:2px solid transparent;border-radius:12px;padding:10px;text-align:center;font-weight:900}.sel{border-color:#7c3aed!important}.panel{border-left:1px solid #d8e0ee;padding:12px}.menu button,.result,.tool button{display:block;width:100%;text-align:left;border:0;background:white;border-bottom:1px solid #eef2f7;padding:10px}.menu,.tool,.results{border:1px solid #e5e7eb;border-radius:12px;overflow:hidden;margin:8px 0}.photo{background:linear-gradient(#bfdbfe 0 45%,#bbf7d0 46%)}.person{position:absolute;left:130px;bottom:55px;width:68px;height:115px;background:#60a5fa;border-radius:34px 34px 18px 18px}.person:before{content:'';position:absolute;width:45px;height:45px;border-radius:50%;background:#f8c7a5;left:11px;top:-28px}.sign{position:absolute;left:150px;right:110px;bottom:25px;height:44px;background:white;border:3px solid #f59e0b;border-radius:10px;display:grid;place-items:center}.notice{position:absolute;right:36px;top:55px;background:white;border:3px solid #ef4444;border-radius:10px;padding:7px;font-weight:900;font-size:12px}.can{position:absolute;left:55px;bottom:30px;width:30px;height:42px;background:#ef4444;border:3px solid white;border-radius:8px}.masked{outline:5px solid #2563eb;box-shadow:0 0 0 9px #2563eb22}.warm{height:16px;border-radius:99px;background:linear-gradient(90deg,#bfdbfe,#fff7ed,#fed7aa);margin:8px 0}@media(max-width:850px){.wrap,.grid,.canva,.adobe,.panes{grid-template-columns:1fr}.panel{border-left:0}}</style></head><body><div class='wrap'><aside class='side'><h2>AI 도구 기능형</h2><p>목표를 읽고 실제 기능을 찾아 조작합니다. ?debug=1 로그 확인.</p><nav id='nav' class='nav'></nav></aside><main id='main'></main></div><script>const D=new URLSearchParams(location.search).has('debug');if(D)document.body.classList.add('dbg');const S={q1:{e:[],dir:'ko',src:'우리 학교에서 함께 만든 추억을 오래 간직해요.',memo:'',hist:[],clip:''},q2:{e:[],sel:0,menu:0,voice:0,text:'우리 학교에 온 거 완전 신기하고 대박이야! 다 같이 엄청 재밌게 놀자!!!',pre:''},q3:{e:[],tool:'',mask:{notice:0,can:0,face:0,sign:0},removed:0,result:''}};let pages=['home','q1','q2','q3'];let names=['안내','Google 번역','Canva','Adobe Express'];const $=x=>document.querySelector(x);function cur(){return location.hash.replace('#/','')||'home'}function nav(){let c=cur();nav.innerHTML=pages.map((p,i)=>`<a class='${c==p?'on':''}' href='#/${p}'>${names[i]}</a>`).join('')}function log(q,e){S[q].e.push(e);dbg(q)}function dbg(q){let d=$('#dbg');if(d)d.textContent=JSON.stringify(S[q],null,2)}function shell(t,b){main.innerHTML=`<section class='box'><h2>${t}</h2>${b}<pre id='dbg' class='debug'></pre><p><a class='btn' href='#/home'>안내로</a> <button class='btn pri' onclick="log('${cur()}','submit')">이 문항 제출</button></p></section>`}function dev(n,b){return `<div class='dev'><div class='bar'>${n}</div><div class='body'>${b}</div></div>`}function home(){shell('기능형 3문항 샘플',`<div class='chat'>캐릭터는 목표만 말합니다. 학생은 실제 UI 버튼·메뉴·입력창을 찾아 조작합니다.</div>`)}function tr(){let q=S.q1;if(q.src.includes('오래')||q.src.includes('간직'))return ['Tuhifadhi kumbukumbu tulizotengeneza pamoja shuleni kwetu kwa muda mrefu.','우리 학교에서 만든 기억을 오랫동안 보관합시다.'];if(q.src.includes('기억'))return ['Tukumbuke kumbukumbu tulizotengeneza pamoja shuleni kwetu.','우리 학교에서 함께 만든 추억을 기억해요.'];return ['Karibu shuleni kwetu.','우리 학교에 오신 것을 환영합니다.']}function q1(){let q=S.q1,a=tr(),l=q.dir=='ko'?'한국어':'스와힐리어',r=q.dir=='ko'?'스와힐리어':'한국어',inp=q.dir=='ko'?q.src:a[0],out=q.dir=='ko'?a[0]:a[1],hist=q.hist.length?q.hist.map((h,i)=>`<div class='item'><b>${i+1}. ${h.d}</b><br>${h.t}</div>`).join(''):`<div class='item'>기록 없음</div>`,fin=q.hist.length?q.hist.map((h,i)=>`<label><input type='radio' name='f' onclick='log("q1","final")'> ${h.t}</label>`).join(''):`<div class='item'>기록이 생기면 선택합니다.</div>`;let g=`<div class='langs'><b>${l}</b> <button class='swap' title='언어 전환' onclick='swap1()'>⇄</button> <b>${r}</b></div><div class='panes'><div class='pane'><b>입력</b><textarea id='src' oninput='edit1(this.value)'>${inp}</textarea></div><div class='pane'><b>번역 결과</b><div class='out'>${out}</div><p><button class='btn' onclick='copy1()'>복사</button></p></div></div><div class='hist'><h3>최근 번역</h3>${hist}</div>`;let m=`<div class='memo'><h3>메모장</h3><textarea oninput='S.q1.memo=this.value'>${q.memo}</textarea><p><button class='btn' onclick='paste1()'>붙여넣기</button></p></div><div class='final'><h3>최종 번역 선택</h3>${fin}</div>`;shell('스와힐리어 번역 검증',`<div class='chat'>스와힐리어 번역이 맞는지 모르겠어. 나중에 어떤 번역을 쓸지 비교할 수 있게 확인한 내용을 남겨두면 좋겠어.</div><div class='grid'>${dev('Google 번역',g)}${m}</div>`);dbg('q1')}function swap1(){let q=S.q1,a=tr();q.dir=q.dir=='ko'?'sw':'ko';q.hist.push({d:q.dir=='sw'?'스와힐리어→한국어':'한국어→스와힐리어',t:q.dir=='sw'?a[1]:a[0]});log('q1','swap');q1()}function edit1(v){S.q1.src=v;log('q1','edit')}function copy1(){let a=tr();S.q1.clip=S.q1.dir=='ko'?a[0]:a[1];log('q1','copy')}function paste1(){if(S.q1.clip){S.q1.memo+=(S.q1.memo?'\n':'')+S.q1.clip;q1();log('q1','paste')}}function q2(){let q=S.q2,menu=q.menu?`<div class='menu'><button onclick='rewrite2()'>다시 쓰기</button><button onclick='short2()'>짧게</button><button onclick='voice2()'>문체 바꾸기</button><button onclick='fix2()'>맞춤법 고치기</button></div>`:'',voice=q.voice?`<div class='menu'><button onclick='formal2()'>더 격식 있게</button><button onclick='friendly2()'>더 친근하게</button><button onclick='fun2()'>더 재미있게</button></div>`:'',pre=q.pre?`<div class='preview'>${q.pre}<p><button class='btn pri' onclick='apply2()'>적용</button></p></div>`:'';shell('Canva 문구 다듬기',`<div class='chat'>카드 문구가 너무 길고 장난스러워 보여. 더 공손하고 짧게 고치고 싶어.</div>${dev('Canva',`<div class='canva'><div class='stage'><div class='poster'><p><button class='btn' onclick='magic2()'>마법 글쓰기</button></p><div id='q2text' class='cardtext ${q.sel?'sel':''}' onclick='sel2()'>${q.text}</div></div></div><div class='panel'><b>텍스트 도구</b>${menu}${voice}${pre}</div></div>`)}`);dbg('q2')}function sel2(){S.q2.sel=1;log('q2','select_text');q2()}function magic2(){S.q2.menu=1;log('q2','magic');q2()}function voice2(){S.q2.voice=1;log('q2','voice');q2()}function formal2(){S.q2.pre='우리 학교에 온 것을 진심으로 환영해요. 함께 좋은 추억을 만들어요.';log('q2','formal');q2()}function short2(){S.q2.pre='우리 학교에 온 것을 환영해요. 함께 좋은 추억을 만들어요.';log('q2','short');q2()}function rewrite2(){S.q2.pre='우리 학교에 와 줘서 고마워요. 즐거운 시간을 보내요.';log('q2','rewrite');q2()}function fix2(){S.q2.pre=S.q2.text.replace('!!!','!');log('q2','fix');q2()}function friendly2(){S.q2.pre='우리 학교에 와 줘서 반가워요. 함께 추억을 만들어요.';log('q2','friendly');q2()}function fun2(){S.q2.pre='환영 파티 시작! 신나게 추억을 만들어요!';log('q2','fun');q2()}function apply2(){S.q2.text=S.q2.pre||S.q2.text;log('q2','apply');q2()}function q3(){let q=S.q3,tool=`<div class='tool'><button onclick='tool3("crop")'>자르기</button><button onclick='tool3("adjust")'>조정</button><button onclick='tool3("remove-bg")'>배경 제거</button><button onclick='tool3("remove")'>개체 제거</button></div>`,remove=q.tool=='remove'?`<button class='btn pri' onclick='remove3()'>제거</button>`:'',res=q.removed?`<div class='results'><button class='result' onclick='res3("r1")'>결과 1 · 얼굴이 어색함</button><button class='result' onclick='res3("r2")'>결과 2 · 캔이 남아 있음</button><button class='result' onclick='res3("r3")'>결과 3 · 전화번호와 캔이 사라지고 얼굴과 카드는 유지됨</button></div><button class='btn pri' onclick='log("q3","keep")'>유지</button>`:'',adj=q.tool=='adjust'?`<div class='warm'></div><input type='range' oninput='log("q3","warm")'><button class='btn pri' onclick='log("q3","apply_adjust")'>적용</button>`:'';let photo=`<div class='photo'><div class='person ${q.mask.face?'masked':''}' onclick='mask3(event,"face")'></div><div class='sign ${q.mask.sign?'masked':''}' onclick='mask3(event,"sign")'>WELCOME</div><div class='notice ${q.mask.notice?'masked':''}' onclick='mask3(event,"notice")'>연락처<br>010-1234-5678</div><div class='can ${q.mask.can?'masked':''}' onclick='mask3(event,"can")'></div></div>`;shell('Adobe Express 사진 편집',`<div class='chat'>전화번호 안내문과 캔만 없애고, 친구 얼굴과 환영 카드는 그대로 두고 싶어. 분위기도 따뜻하게 보이면 좋겠어.</div>${dev('Adobe Express',`<div class='adobe'><div class='stage'>${photo}</div><div class='panel'>${tool}${remove}${res}${adj}</div></div>`)}`);dbg('q3')}function tool3(t){S.q3.tool=t;log('q3','tool_'+t);q3()}function mask3(e,k){e.stopPropagation();if(S.q3.tool=='remove'){S.q3.mask[k]=!S.q3.mask[k];log('q3','mask_'+k);q3()}else log('q3','click_'+k)}function remove3(){S.q3.removed=1;log('q3','remove');q3()}function res3(r){S.q3.result=r;log('q3','result_'+r);q3()}function route(){nav();let c=cur();if(c=='q1')q1();else if(c=='q2')q2();else if(c=='q3')q3();else home()}addEventListener('hashchange',route);route();</script></body></html>
