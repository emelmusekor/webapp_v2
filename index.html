<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>AI 도구 기능형 3문항</title><style>
*{box-sizing:border-box}body{margin:0;background:#eef2f7;font-family:system-ui,'Noto Sans KR',sans-serif;color:#111827}.wrap{max-width:1120px;margin:auto;padding:18px;display:grid;grid-template-columns:220px 1fr;gap:14px}.side,.card,.app{background:white;border:1px solid #d8e0ee;border-radius:18px;box-shadow:0 10px 28px #0f172a18}.side{padding:14px}.brand{font-size:18px;font-weight:900}.hint,.sub,.mini{font-size:13px;color:#64748b}.nav a{display:block;padding:10px;margin:8px 0;border:1px solid #e5e7eb;border-radius:12px;color:#111827;text-decoration:none;font-weight:800}.nav a.on{background:#eff6ff;border-color:#2563eb;color:#1d4ed8}.card{padding:18px}.btn{border:1px solid #cbd5e1;background:#fff;border-radius:10px;padding:8px 10px;font-weight:800;cursor:pointer}.btn:hover{background:#f8fbff}.pri{background:#2563eb;color:#fff;border-color:#2563eb}.warn{background:#fff7ed;color:#9a3412;border-color:#fdba74}.talk,.story{display:flex;gap:10px;padding:12px;margin:12px 0;border-radius:14px;background:#f6f9ff;border:1px solid #d7e5ff}.story{background:#fffdf6;border-color:#fde68a}.av{width:36px;height:36px;border-radius:12px;background:#dbeafe;display:grid;place-items:center;flex:0 0 auto}.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.app{overflow:hidden}.bar{padding:10px 12px;background:#f1f5f9;border-bottom:1px solid #d8e0ee;font-weight:900}.body{padding:12px}.box{border:1px solid #d8e0ee;border-radius:12px;overflow:hidden;background:#fff;margin:10px 0}.box h3{margin:0;background:#f8fafc;border-bottom:1px solid #e5e7eb;padding:8px 10px;font-size:13px}.item,.box label{display:block;padding:8px 10px;border-bottom:1px solid #eef2f7;font-size:13px}.done{display:none;background:#dcfce7;color:#166534;border:1px solid #86efac;border-radius:12px;padding:10px;margin:10px 0;font-weight:900}.done.show{display:block}.actions{display:flex;justify-content:space-between;gap:8px;flex-wrap:wrap;margin-top:12px}.logs{border:1px solid #d8e0ee;border-radius:12px;background:#fff;overflow:hidden;margin-top:12px}.logs h3{margin:0;background:#f8fafc;border-bottom:1px solid #e5e7eb;padding:8px 10px;font-size:13px}.logs ol{margin:0;padding:8px 8px 8px 30px;min-height:40px}.logs li{font-size:13px}.empty{color:#94a3b8;padding:9px;font-size:13px}.debug{display:none;background:#0f172a;color:#dbeafe;border-radius:12px;padding:10px;white-space:pre-wrap;font:12px monospace}.debugOn .debug{display:block}textarea{width:100%;min-height:96px;border:0;outline:0;resize:vertical;font:15px inherit}.panes{display:grid;grid-template-columns:1fr 1fr}.pane{padding:10px;min-height:132px}.pane+.pane{border-left:1px solid #e5e7eb}.lang{text-align:center;color:#1d4ed8;font-weight:900}.gtop{display:grid;grid-template-columns:1fr 50px 1fr;padding:8px;border-bottom:1px solid #e5e7eb}.rewrite{background:#fff7ed;border:1px dashed #f59e0b;border-radius:12px;padding:10px;margin:10px 0}.cand{border:1px solid #e5e7eb;border-radius:12px;margin:8px;padding:9px}.cand.sel{border-color:#2563eb;outline:3px solid #2563eb22}.chip{border:1px solid #d8e0ee;background:#fff;border-radius:999px;padding:7px 9px;margin:3px;font-size:12px;font-weight:800}.chip.on{background:#eff6ff;border-color:#2563eb;color:#1d4ed8}.prompt{border:1px solid #e5e7eb;background:#f8fafc;border-radius:12px;padding:10px;min-height:64px;font-size:13px}.cards{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.gen{border:2px solid #e5e7eb;border-radius:14px;background:#fff;padding:8px;cursor:pointer}.gen.on{border-color:#2563eb;outline:3px solid #2563eb22}.art{height:120px;border-radius:12px;margin-bottom:7px;display:grid;place-items:center;overflow:hidden}.art svg{width:100%;height:100%}.cap{font-size:12px;color:#475467}.adobe{display:grid;grid-template-columns:1fr 260px;border:1px solid #d8e0ee;border-radius:14px;overflow:hidden;background:#e9edf5}.dark{background:#111827;color:white}.stage{display:grid;place-items:center;padding:18px}.photo{--w:.2;width:450px;height:300px;border:7px solid #fff;border-radius:20px;position:relative;background:linear-gradient(#bfdbfe 0 45%,#bbf7d0 46%);filter:sepia(var(--w)) saturate(calc(1 + var(--w))) brightness(calc(1 + var(--w)*.08));box-shadow:0 14px 30px #0f172a22}.ov{position:absolute;inset:0;background:rgba(251,146,60,var(--w));border-radius:13px;pointer-events:none;mix-blend-mode:soft-light}.person{position:absolute;left:135px;bottom:58px;width:64px;height:106px;background:#60a5fa;border-radius:32px 32px 16px 16px}.person:before{content:'';position:absolute;width:42px;height:42px;border-radius:50%;background:#f8c7a5;left:11px;top:-27px}.sign{position:absolute;left:158px;right:100px;bottom:26px;height:42px;background:white;border:3px solid #f59e0b;border-radius:10px;display:grid;place-items:center;font-weight:900}.notice{position:absolute;right:34px;top:52px;background:white;border:3px solid #ef4444;border-radius:10px;padding:7px;font-weight:900;font-size:12px}.can{position:absolute;left:50px;bottom:28px;width:28px;height:40px;background:#ef4444;border:3px solid #fff;border-radius:8px}.masked{outline:5px solid #2563eb;box-shadow:0 0 0 9px #2563eb22}.removed{opacity:.08}.panel{background:white;border-left:1px solid #d8e0ee;padding:12px}.tool{display:grid;grid-template-columns:1fr 1fr;gap:7px}.result{display:block;width:100%;border:1px solid #d8e0ee;background:#fff;border-radius:10px;text-align:left;padding:9px;margin:7px 0}.result.on{border-color:#2563eb;outline:3px solid #2563eb22}.warm{height:16px;border-radius:99px;background:linear-gradient(90deg,#bfdbfe,#fff7ed,#fed7aa);margin:8px 0}.snap{font-size:12px;background:#f8fafc;border:1px solid #e5e7eb;border-radius:10px;padding:9px;margin-top:8px}@media(max-width:850px){.wrap,.grid,.adobe,.panes{grid-template-columns:1fr}.photo{width:100%;max-width:450px}.cards{grid-template-columns:1fr}.side{position:relative}.panel{border:0}}
</style></head><body><div class="wrap"><aside class="side"><div class="brand">AI 도구 기능형</div><p class="hint">제출 후 현재 상태와 누른 행동이 남습니다.</p><nav id="nav" class="nav"></nav><button id="resetAll" class="btn warn">전체 초기화</button></aside><main id="main"></main></div><script>
const D={q1:()=>({e:[],sub:0,story:'아직 번역 결과를 확인하지 않았어요.',src:'우리 학교에서 함께 만든 추억을 오래 간직해요.',sw1:'Tuhifadhi kumbukumbu tulizotengeneza pamoja shuleni kwetu kwa muda mrefu.',back1:'',rewrite:'우리 학교에서 함께 만든 추억을 기억해요.',sw2:'',back2:'',sel:''}),q2:()=>({e:[],sub:0,story:'어울리는 그림을 만들려면 상황에 맞는 조건을 골라야 해요.',opts:[],gen:0,sel:''}),q3:()=>({e:[],sub:0,story:'사진에서 무엇을 지우고 무엇을 남길지 판단해야 해요.',tool:'',mask:{notice:0,can:0,face:0,sign:0},removed:0,res:'',warm:22,snap:''})};let S={q1:D.q1(),q2:D.q2(),q3:D.q3()};const pages=[['home','안내'],['q1','번역 검증'],['q2','그림 생성'],['q3','사진 편집']],$=s=>document.querySelector(s),$$=s=>[...document.querySelectorAll(s)];if(new URLSearchParams(location.search).has('debug'))document.body.classList.add('debugOn');function cur(){return location.hash.replace('#/','')||'home'}function nav(){let c=cur();document.getElementById('nav').innerHTML=pages.map(p=>`<a class="${c==p[0]?'on':''}" href="#/${p[0]}">${p[1]}</a>`).join('')}function rec(q,a,st){S[q].e.push(a);if(st)S[q].story=st;draw(q);dbg(q)}function draw(q){let x=$('#log');if(x)x.innerHTML=S[q].e.length?`<ol>${S[q].e.map(v=>`<li>${v}</li>`).join('')}</ol>`:'<div class="empty">아직 누른 행동이 없습니다.</div>'}function submit(q){S[q].sub=1;if(q==='q3')S.q3.snap=`제출 상태: 도구=${S.q3.tool||'없음'}, 결과=${S.q3.res||'없음'}, 따뜻함=${S.q3.warm}`;rec(q,'문항 제출',q==='q3'?'현재 사진 상태로 제출되었습니다.':'문항이 제출되었습니다.');route()}function reset(q){S[q]=D[q]();route()}function dbg(q){let d=$('#dbg');if(d)d.textContent=JSON.stringify(S[q],null,2)}function shell(q,t,s,b){main.innerHTML=`<section class="card"><h2>${t}</h2><div class="sub">${s}</div>${b}<div class="story"><div class="av">💬</div><div>${S[q].story}</div></div><div class="done ${S[q].sub?'show':''}">제출되었습니다.</div><div class="logs"><h3>누른 행동 기록</h3><div id="log"></div></div><pre id="dbg" class="debug"></pre><div class="actions"><span><a class="btn" href="#/home">안내로</a> <button id="rst" class="btn warn">이 단계 초기화</button></span><button id="submit" class="btn pri">문항 제출</button></div></section>`;$('#rst').onclick=()=>reset(q);$('#submit').onclick=()=>submit(q);draw(q);dbg(q)}function app(n,b,c=''){return`<div class="app"><div class="bar ${c}">${n}</div><div class="body">${b}</div></div>`}function home(){main.innerHTML=`<section class="card"><h1>기능형 3문항 샘플</h1><p class="sub">대화 속 목표를 파악하고 실제 도구의 기능을 찾아 조작합니다.</p><p><a class="btn pri" href="#/q1">1번 시작</a> <a class="btn pri" href="#/q2">2번 시작</a> <a class="btn pri" href="#/q3">3번 시작</a></p></section>`}
function q1(){let q=S.q1,L=app('번역 도구',`<div class="gtop"><div class="lang">한국어</div><button class="btn">⇄</button><div class="lang">스와힐리어</div></div><div class="panes"><div class="pane"><b>입력</b><textarea id="src">${q.src}</textarea></div><div class="pane"><b>스와힐리어 번역 1</b><div>${q.sw1}</div><p><button id="back1" class="btn">역번역</button> <button id="copy1" class="btn">복사</button></p></div></div><div class="box"><h3>역번역 결과</h3><div class="item">${q.back1||'역번역 버튼을 누르면 표시됩니다.'}</div></div><div class="rewrite"><b>한글 다시 쓰기</b><br>${q.rewrite}<p><button id="paste" class="btn">한글 다시 쓰기 내용 붙여넣기</button></p></div>${q.sw2?`<div class="box"><h3>스와힐리어 번역 2</h3><div class="item">${q.sw2}</div><div class="item"><button id="back2" class="btn">다시 역번역</button></div></div>`:''}${q.back2?`<div class="box"><h3>다시 역번역 결과</h3><div class="item">${q.back2}</div></div>`:''}`),R=app('비교와 최종 선택',`<div class="box"><h3>최종 스와힐리어 번역 고르기</h3><div class="cand ${q.sel==='first'?'sel':''}"><label><input type="radio" name="f" value="first" ${q.sel==='first'?'checked':''}> 번역 1<br>${q.sw1}</label></div>${q.sw2?`<div class="cand ${q.sel==='second'?'sel':''}"><label><input type="radio" name="f" value="second" ${q.sel==='second'?'checked':''}> 번역 2<br>${q.sw2}</label></div>`:'<div class="item">한글 다시 쓰기를 붙여넣으면 번역 2가 생깁니다.</div>'}</div>`);shell('q1','1. 번역 결과 비교','역번역과 다시 역번역으로 두 스와힐리어 번역을 비교합니다.',`<div class="talk"><div class="av">🧒</div><div>스와힐리어 번역이 맞는지 모르겠어. 더 나은 한글 문장으로 다시 번역한 뒤 둘 중 최종으로 쓸 것을 고르고 싶어.</div></div><div class="grid">${L}${R}</div>`);$('#src').oninput=e=>{S.q1.src=e.target.value;rec('q1','한글 입력창 수정','원문을 직접 고쳤습니다.')};$('#back1').onclick=()=>{S.q1.back1='우리 학교에서 만든 기억을 오랫동안 보관합시다.';rec('q1','역번역 버튼 누르기','처음 번역은 의미가 조금 어색합니다. 더 자연스러운 한글로 다시 써 볼 수 있어요.');q1()};$('#copy1').onclick=()=>rec('q1','스와힐리어 번역 1 복사','첫 번째 번역을 비교 후보로 남겼습니다.');$('#paste').onclick=()=>{S.q1.src=S.q1.rewrite;S.q1.sw2='Tukumbuke kumbukumbu tulizotengeneza pamoja shuleni kwetu.';rec('q1','한글 다시 쓰기 내용 붙여넣기','다시 쓴 한글 문장을 넣었습니다. 이제 두 번째 번역을 확인할 수 있어요.');q1()};if($('#back2'))$('#back2').onclick=()=>{S.q1.back2='우리 학교에서 함께 만든 추억을 기억해요.';rec('q1','다시 역번역 버튼 누르기','두 번째 번역은 뜻이 더 잘 유지됩니다. 이제 최종 번역을 고르면 됩니다.');q1()};$$('input[name=f]').forEach(x=>x.onchange=e=>{S.q1.sel=e.target.value;rec('q1','최종 스와힐리어 번역 선택','두 번역을 비교해서 최종 후보를 골랐습니다.');q1()})}
function q2(){let q=S.q2,opt=v=>`<button class="chip ${q.opts.includes(v)?'on':''}" data-o="${v}">${v}</button>`,p=['환영 앨범 표지 배경',...q.opts].join(', ');shell('q2','2. 어울리는 그림 생성','상황에 맞는 생성 조건을 여러 번 선택하고 알맞은 결과를 고릅니다.',`<div class="talk"><div class="av">👧</div><div>환영 앨범 표지에 어울리는 그림이 필요해. 실제 친구 얼굴이나 읽을 수 있는 글자는 넣지 않고, 따뜻한 교실 분위기의 배경 그림이면 좋겠어.</div></div><div class="grid"><div class="app"><div class="bar dark">AI 그림 생성 조건</div><div class="body"><div class="prompt">${p}</div><p>${opt('따뜻한 종이 콜라주')}${opt('실제 얼굴 없음')}${opt('글자 없음')}${opt('정사각형')}${opt('교실 환영 분위기')}${opt('큰 국기와 민족 의상 강조')}${opt('실제 학생 사진처럼')}</p><button id="gen" class="btn pri">그림 생성</button></div></div>${app('생성 결과',q.gen?cards(q.sel):'<div class="empty">조건을 고르고 그림 생성 버튼을 누르면 결과가 나타납니다.</div>')}</div>`);$$('[data-o]').forEach(b=>b.onclick=()=>{let v=b.dataset.o;S.q2.opts=S.q2.opts.includes(v)?S.q2.opts.filter(x=>x!==v):[...S.q2.opts,v];rec('q2','조건 선택: '+v,story(v));q2()});$('#gen').onclick=()=>{S.q2.gen=1;rec('q2','그림 생성 버튼 누르기','선택한 조건으로 그림 후보가 만들어졌습니다.');q2()};$$('[data-card]').forEach(c=>c.onclick=()=>{S.q2.sel=c.dataset.card;rec('q2','생성 결과 '+c.dataset.card+' 선택',c.dataset.card==='2'?'목표에 가장 가까운 그림을 골랐습니다.':'선택은 기록됐지만 조건과 맞는지 다시 살펴봐야 합니다.');q2()})}function story(v){return {'따뜻한 종이 콜라주':'따뜻한 표지 분위기에 맞는 스타일을 골랐습니다.','실제 얼굴 없음':'실제 학생 얼굴이 나오지 않게 했습니다.','글자 없음':'AI 이미지에 깨진 글자가 생기지 않게 했습니다.','정사각형':'표지에 맞는 비율을 골랐습니다.','교실 환영 분위기':'앨범 상황에 맞는 배경을 골랐습니다.'}[v]||'조건을 선택했습니다. 목표와 맞는 조건인지 판단해야 합니다.'}function cards(sel){return`<div class="cards"><div class="gen ${sel==='1'?'on':''}" data-card="1"><div class="art"><svg viewBox="0 0 200 140"><rect width="200" height="140" fill="#dbeafe"/><circle cx="58" cy="60" r="22" fill="#f8c7a5"/><text x="85" y="72" fill="#ef4444" font-weight="900">WELC0M</text></svg></div><div class="cap">얼굴이 있고 글자가 깨져 보임</div></div><div class="gen ${sel==='2'?'on':''}" data-card="2"><div class="art"><svg viewBox="0 0 200 140"><rect width="200" height="140" fill="#fff7ed"/><circle cx="45" cy="45" r="24" fill="#fde68a"/><rect x="80" y="42" width="78" height="52" rx="12" fill="#bfdbfe"/><path d="M25 115 C70 90 120 128 175 100" stroke="#f59e0b" stroke-width="12" fill="none" opacity=".55"/></svg></div><div class="cap">글자·실제 얼굴 없이 따뜻한 교실 배경</div></div><div class="gen ${sel==='3'?'on':''}" data-card="3"><div class="art"><svg viewBox="0 0 200 140"><rect width="200" height="140" fill="#dcfce7"/><rect x="16" y="18" width="168" height="48" fill="#ef4444"/><rect x="16" y="66" width="168" height="48" fill="#2563eb"/></svg></div><div class="cap">큰 국기 느낌이 강함</div></div></div>`}
function q3(){let q=S.q3,w=q.warm/100,rm=q.res==='r3'?'removed':'',rem=q.tool==='remove'?'<button id="remove" class="btn pri">제거</button><p class="mini">브러시로 없앨 영역을 선택합니다.</p>':'',res=q.removed?`<button class="result ${q.res==='r1'?'on':''}" data-r="r1">결과 1 · 얼굴이 어색함</button><button class="result ${q.res==='r2'?'on':''}" data-r="r2">결과 2 · 캔이 남아 있음</button><button class="result ${q.res==='r3'?'on':''}" data-r="r3">결과 3 · 전화번호와 캔이 사라지고 얼굴과 카드는 유지됨</button><button id="keep" class="btn pri">유지</button>`:'',adj=q.tool==='adjust'?`<div class="warm"></div><input id="warm" type="range" min="0" max="100" value="${q.warm}"><button id="adj" class="btn pri">적용</button>`:'';shell('q3','3. 현재 사진 상태로 제출','조정하면 사진이 실제로 바뀌고 제출 시 현재 상태가 저장됩니다.',`<div class="talk"><div class="av">🧑</div><div>전화번호 안내문과 캔만 없애고, 친구 얼굴과 환영 카드는 그대로 두고 싶어. 분위기도 따뜻하게 보이면 좋겠어.</div></div><div class="adobe"><div><div class="bar dark">Adobe Express</div><div class="stage"><div id="photo" class="photo" style="--w:${w}"><div class="ov"></div><div id="face" class="person ${q.mask.face?'masked':''}"></div><div id="sign" class="sign ${q.mask.sign?'masked':''}">WELCOME</div><div id="notice" class="notice ${q.mask.notice?'masked':''} ${rm}">연락처<br>010-1234</div><div id="can" class="can ${q.mask.can?'masked':''} ${rm}"></div></div></div></div><div class="panel"><b>이미지</b><div class="tool"><button data-t="crop" class="btn">자르기</button><button data-t="adjust" class="btn">조정</button><button data-t="removeBg" class="btn">배경 제거</button><button data-t="remove" class="btn">개체 제거</button></div>${rem}${res}${adj}${q.snap?`<div class="snap">${q.snap}</div>`:''}</div></div>`);$$('[data-t]').forEach(b=>b.onclick=()=>{S.q3.tool=b.dataset.t;rec('q3','도구 선택: '+b.textContent,b.dataset.t==='adjust'?'조정 도구를 열었습니다. 따뜻함을 바꾸면 사진 색감이 실제로 바뀝니다.':b.dataset.t==='remove'?'개체 제거 도구를 열었습니다. 없앨 부분만 골라야 합니다.':'도구를 선택했습니다.');q3()});['notice','can','face','sign'].forEach(id=>$('#'+id).onclick=e=>{e.stopPropagation();if(S.q3.tool==='remove'){S.q3.mask[id]=!S.q3.mask[id];rec('q3','영역 선택: '+id,id==='notice'||id==='can'?'없애야 할 방해 요소를 선택했습니다.':'보존해야 할 영역을 선택했습니다.')}else rec('q3','도구 없이 영역 클릭: '+id,'먼저 편집 도구를 골라야 합니다.');q3()});if($('#remove'))$('#remove').onclick=()=>{S.q3.removed=1;rec('q3','제거 버튼 누르기','제거 결과 후보가 나타났습니다.');q3()};$$('[data-r]').forEach(b=>b.onclick=()=>{S.q3.res=b.dataset.r;rec('q3','결과 선택: '+b.dataset.r,b.dataset.r==='r3'?'전화번호와 캔이 사라진 결과입니다.':'결과를 선택했습니다.');q3()});if($('#keep'))$('#keep').onclick=()=>rec('q3','유지 버튼 누르기','선택한 제거 결과를 현재 사진 상태로 유지했습니다.');if($('#warm'))$('#warm').oninput=e=>{S.q3.warm=+e.target.value;$('#photo').style.setProperty('--w',S.q3.warm/100);rec('q3','따뜻함 조정: '+S.q3.warm,'사진 색감이 실제로 바뀌었습니다.')};if($('#adj'))$('#adj').onclick=()=>rec('q3','조정 적용','현재 색감 상태가 적용되었습니다.')}function route(){nav();let c=cur();if(c==='q1')q1();else if(c==='q2')q2();else if(c==='q3')q3();else home()}resetAll.onclick=()=>{S={q1:D.q1(),q2:D.q2(),q3:D.q3()};route()};addEventListener('hashchange',route);route();async function selftest(){try{location.hash='#/q1';route();back1.click();paste.click();back2.click();document.querySelector('input[value="second"]').click();document.getElementById('submit').click();if(!S.q1.sub)throw Error('q1');rst.click();if(S.q1.e.length)throw Error('q1reset');location.hash='#/q2';route();document.querySelector('[data-o="따뜻한 종이 콜라주"]').click();document.querySelector('[data-o="실제 얼굴 없음"]').click();document.querySelector('[data-o="글자 없음"]').click();gen.click();document.querySelector('[data-card="2"]').click();document.getElementById('submit').click();if(!S.q2.sub)throw Error('q2');rst.click();if(S.q2.e.length)throw Error('q2reset');location.hash='#/q3';route();document.querySelector('[data-t="remove"]').click();notice.click();can.click();remove.click();document.querySelector('[data-r="r3"]').click();keep.click();document.querySelector('[data-t="adjust"]').click();let w=$('#warm');w.value=77;w.dispatchEvent(new Event('input',{bubbles:true}));adj.click();document.getElementById('submit').click();if(!S.q3.sub||!S.q3.snap)throw Error('q3');rst.click();if(S.q3.e.length)throw Error('q3reset');document.body.setAttribute('data-selftest','all pass')}catch(e){document.body.setAttribute('data-selftest','fail: '+e.message)}}if(new URLSearchParams(location.search).has('selftest'))setTimeout(selftest,40);
</script></body></html>
