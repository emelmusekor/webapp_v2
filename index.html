<style>
body{margin:0;background:#eef2f7;color:#111827;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif}.wrap{max-width:1320px;margin:auto;padding:22px;display:grid;grid-template-columns:260px 1fr;gap:20px}.side,.card{background:white;border:1px solid #d8e0ee;border-radius:22px;box-shadow:0 18px 42px #0f172a1a}.side{position:sticky;top:18px;height:calc(100vh - 36px);padding:16px}.brand{font-weight:900;font-size:18px;margin-bottom:12px}.note{font-size:13px;color:#667085;line-height:1.55;background:#f8fafc;border:1px solid #e5e7eb;border-radius:14px;padding:12px}.nav{display:grid;gap:8px;margin-top:14px}.nav a{padding:11px;border:1px solid #e5e7eb;border-radius:14px;color:#111827;text-decoration:none;font-weight:800}.nav a.on{background:#eff6ff;border-color:#2563eb;color:#1d4ed8}.card{padding:22px;margin-bottom:18px}.head h1,.head h2{margin:0 0 6px}.sub{color:#667085;font-size:14px}.chat{display:flex;gap:12px;align-items:flex-start;background:#f6f9ff;border:1px solid #d7e5ff;border-radius:16px;padding:13px;margin:16px 0}.av{width:42px;height:42px;border-radius:14px;background:#dbeafe;display:grid;place-items:center;font-size:24px}.btn{border:1px solid #cbd5e1;background:#fff;border-radius:11px;padding:8px 11px;font-weight:800;cursor:pointer}.btn:hover{background:#f8fbff;border-color:#93b4ed}.btn.primary{background:#2563eb;border-color:#2563eb;color:#fff}.device{border:1px solid #d8e0ee;border-radius:18px;overflow:hidden;background:#fff}.bar{height:44px;background:#f1f5f9;border-bottom:1px solid #d8e0ee;display:flex;align-items:center;padding:0 13px;font-weight:900;color:#475569}.body{padding:16px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}.muted{font-size:12px;color:#667085}.debug{display:none;margin-top:14px;background:#0f172a;color:#dbeafe;border-radius:14px;padding:12px;font:12px ui-monospace,Menlo,monospace;white-space:pre-wrap}.dbg .debug{display:block}.next{display:flex;justify-content:space-between;gap:10px;margin-top:15px}.gt{border:1px solid #d8e0ee;border-radius:16px;overflow:hidden}.gtop{display:flex;align-items:center;justify-content:center;gap:18px;padding:10px;border-bottom:1px solid #e5e7eb}.lang{font-weight:900;color:#1d4ed8;min-width:100px;text-align:center}.swap{width:42px;height:42px;border-radius:50%;border:1px solid #cbd5e1;background:white;font-size:22px;color:#2563eb}.panes{display:grid;grid-template-columns:1fr 1fr}.pane{padding:13px;min-height:175px;display:flex;flex-direction:column}.pane+.pane{border-left:1px solid #e5e7eb}.pt{font-size:12px;font-weight:900;color:#64748b;margin-bottom:8px;display:flex;justify-content:space-between}.pane textarea{border:0;outline:0;resize:none;min-height:105px;font-size:16px;line-height:1.55}.out{font-size:16px;line-height:1.55;white-space:pre-wrap}.tools{border-top:1px solid #eef2f7;padding-top:9px;display:flex;gap:8px}.memo{border:1px solid #d8e0ee;border-radius:16px;overflow:hidden}.memo h3,.hist h3,.final h3{font-size:13px;margin:0;padding:10px 12px;background:#f8fafc;border-bottom:1px solid #e5e7eb}.memo textarea{width:100%;min-height:176px;border:0;outline:0;resize:vertical;padding:12px;background:#fffdf6}.hist,.final{border:1px solid #d8e0ee;border-radius:16px;overflow:hidden;margin-top:12px}.hist div,.final label{display:block;padding:10px 12px;border-bottom:1px solid #eef2f7;font-size:13px}.canva{display:grid;grid-template-columns:72px 1fr 290px;min-height:510px;border:1px solid #d8e0ee;border-radius:18px;overflow:hidden;background:#f6f7fb}.rail{background:#0f172a;color:#dbeafe;padding:10px 7px;display:grid;align-content:start;gap:8px}.rail button{border:0;background:transparent;color:inherit;border-radius:12px;padding:8px 4px}.rail button:hover,.rail .on{background:#1e293b}.stage{display:grid;place-items:center;padding:22px}.poster{width:330px;height:330px;border-radius:26px;background:linear-gradient(145deg,#dbeafe,#fff7ed);box-shadow:0 16px 35px #0f172a22;position:relative}.photo{position:absolute;inset:24px 24px 112px;border-radius:20px;background:linear-gradient(135deg,#bfdbfe,#fde68a)}.txt{position:absolute;left:26px;right:26px;bottom:26px;background:#ffffffe0;border:2px solid transparent;border-radius:14px;padding:11px;text-align:center;font-weight:900}.txt.sel{border-color:#7c3aed;outline:3px solid #7c3aed22}.panel{background:#fff;border-left:1px solid #d8e0ee;padding:13px}.menu{border:1px solid #e5e7eb;border-radius:14px;overflow:hidden;margin-top:10px}.menu button{display:block;width:100%;text-align:left;border:0;background:#fff;padding:10px 12px;border-bottom:1px solid #eef2f7}.menu button:hover{background:#f8fbff}.preview{margin-top:12px;border:1px solid #d7e5ff;background:#f6f9ff;border-radius:14px;padding:12px}.adobe{display:grid;grid-template-columns:1fr 300px;min-height:520px;border:1px solid #d8e0ee;border-radius:18px;overflow:hidden;background:#e9edf5}.photo2{width:500px;height:340px;border:8px solid white;border-radius:24px;position:relative;background:linear-gradient(#b9d9ff 0 45%,#bbf7d0 46%);box-shadow:0 18px 40px #0f172a22}.person{position:absolute;width:70px;height:122px;border-radius:34px 34px 18px 18px;background:#60a5fa;bottom:60px;left:130px}.person:before{content:"";position:absolute;width:46px;height:46px;border-radius:50%;background:#f8c7a5;left:12px;top:-28px}.sign{position:absolute;left:150px;right:140px;bottom:28px;height:48px;border-radius:12px;background:#fff;border:3px solid #f59e0b;display:grid;place-items:center;font-weight:900}.notice{position:absolute;right:42px;top:60px;width:118px;height:82px;border-radius:10px;background:#fff;border:3px solid #ef4444;padding:8px;font-size:12px;font-weight:900}.can{position:absolute;left:58px;bottom:34px;width:30px;height:44px;border-radius:8px;background:#ef4444;border:3px solid #fff}.maskable{cursor:crosshair}.masked{outline:5px solid #2563eb;box-shadow:0 0 0 10px #2563eb22}.result{display:block;width:100%;text-align:left;border:1px solid #d8e0ee;background:white;border-radius:12px;padding:10px;margin:7px 0}.result.on{border-color:#2563eb;outline:3px solid #2563eb22}.warm{height:18px;border-radius:99px;background:linear-gradient(90deg,#bfdbfe,#fff7ed,#fed7aa);margin:8px 0}@media(max-width:980px){.wrap,.grid,.panes,.canva,.adobe{grid-template-columns:1fr}.side{position:relative;height:auto}.panel{border-left:0}.photo2{width:100%;max-width:500px}}
</style>
</head>
<body>
<div class="wrap"><aside class="side"><div class="brand">AI 도구 기능형 샘플</div><div class="note">대화 속 목표를 파악하고 실제 도구 화면의 메뉴·버튼·입력창을 조작합니다. 학생 화면에는 정답 피드백을 표시하지 않습니다. 로그는 <b>?debug=1</b>에서만 확인합니다.</div><nav id="nav" class="nav"></nav></aside><main id="main"></main></div>
<script>
const debug=new URLSearchParams(location.search).has('debug');if(debug)document.body.classList.add('dbg');
const steps=[['q1','Google 번역: 역번역 검증'],['q2','Canva: 문구 다듬기'],['q3','Adobe Express: 사진 편집']];
const S={q1:{e:[],dir:'ko',src:'우리 학교에서 함께 만든 추억을 오래 간직해요.',sw:'',back:'',hist:[],memo:'',clip:'',done:false},q2:{e:[],sel:false,menu:false,voice:false,text:'우리 학교에 온 거 완전 신기하고 대박이야! 다 같이 엄청 재밌게 놀자!!!',pre:'',done:false},q3:{e:[],tool:'',mask:{notice:false,can:false,face:false,sign:false},removed:false,result:'',done:false}};
const $=q=>document.querySelector(q);function ev(q,x){S[q].e.push(x);dbg(q)}function done(q){S[q].done=true;nav();$('#status').textContent='제출됨';$('#status').className='status ok';dbg(q)}function cur(){return location.hash.replace('#/','')||'home'}
function nav(){let c=cur();$('#nav').innerHTML='<a class="'+(c==='home'?'on':'')+'" href="#/home">안내</a>'+steps.map(s=>'<a class="'+(c===s[0]?'on':'')+'" href="#/'+s[0]+'">'+s[1]+'</a>').join('')}
function box(t,tool,b){return '<section class="card"><div class="head"><div><h2>'+t+'</h2><div class="sub">'+tool+'의 실제 기능을 찾아 조작합니다.</div></div><div id="status" class="status">진행 중</div></div>'+b+'<pre id="debug" class="debug"></pre><div class="next"><a class="btn" href="#/home">안내로</a><button class="btn primary" onclick="done(\''+cur()+'\')">이 문항 제출</button></div></section>'}
function device(n,b){return '<div class="device"><div class="bar">'+n+'</div><div class="body">'+b+'</div></div>'}function dbg(q){let d=$('#debug');if(d)d.textContent=JSON.stringify(S[q],null,2)}
function home(){main.innerHTML='<section class="card head"><div><h1>실제 AI 도구 기능형 3문항</h1><p class="sub">캐릭터는 목표만 말합니다. 학생은 실제 UI 요소를 찾아 조작합니다. 오답 피드백은 숨깁니다.</p></div></section><section class="card"><div class="grid"><div class="chat"><div class="av">🧒</div><div>상황 대화에서 목표를 파악합니다.</div></div><div class="chat"><div class="av">🧰</div><div>버튼·메뉴·입력창 조작 순서로 채점합니다.</div></div></div><div class="next">'+steps.map(s=>'<a class="btn primary" href="#/'+s[0]+'">'+s[1]+'</a>').join('')+'</div></section>'}
function tr(){let q=S.q1,src=q.src;if(src.includes('오래')||src.includes('간직')){q.sw='Tuhifadhi kumbukumbu tulizotengeneza pamoja shuleni kwetu kwa muda mrefu.';q.back='우리 학교에서 만든 기억을 오랫동안 보관합시다.'}else if(src.includes('기억')){q.sw='Tukumbuke kumbukumbu tulizotengeneza pamoja shuleni kwetu.';q.back='우리 학교에서 함께 만든 추억을 기억해요.'}else{q.sw='Karibu shuleni kwetu.';q.back='우리 학교에 오신 것을 환영합니다.'}}
function q1(){let q=S.q1;tr();let left=q.dir==='ko'?'한국어':'스와힐리어',right=q.dir==='ko'?'스와힐리어':'한국어',inp=q.dir==='ko'?q.src:q.sw,out=q.dir==='ko'?q.sw:q.back;main.innerHTML=box('Google 번역으로 스와힐리어 번역 검증','Google 번역','<div class="chat"><div class="av">🧒</div><div>환영 앨범 문장을 스와힐리어로 번역했어. 그런데 뜻이 잘 유지됐는지 모르겠어. <b>나중에 어떤 번역을 쓸지 비교할 수 있게 확인한 내용을 남겨두면 좋겠어.</b></div></div><div class="grid"><div>'+device('Google 번역','<div class="gt"><div class="gtop"><div class="lang">'+left+'</div><button class="swap" title="언어 전환" onclick="swap1()">⇄</button><div class="lang">'+right+'</div></div><div class="panes"><div class="pane"><div class="pt">입력</div><textarea onfocus="ev(\'q1\',\'source_focus\')" oninput="edit1(this.value)">'+inp+'</textarea></div><div class="pane"><div class="pt">번역 결과</div><div class="out">'+out+'</div><div class="tools"><button class="btn" onclick="copy1()">복사</button><button class="btn" onclick="save1()">저장</button></div></div></div></div><div class="hist"><h3>최근 번역</h3>'+(q.hist.length?q.hist.map((h,i)=>'<div><b>'+(i+1)+'. '+h.dir+'</b><br>'+h.txt+'</div>').join(''):'<div class="muted">기록 없음</div>')+'</div>')+'</div><div><div class="memo"><h3>메모장</h3><textarea onfocus="ev(\'q1\',\'memo_focus\')" oninput="S.q1.memo=this.value">'+q.memo+'</textarea><div class="tools"><button class="btn" onclick="paste1()">붙여넣기</button></div></div><div class="final"><h3>최종 번역 선택</h3>'+(q.hist.length?q.hist.map((h,i)=>'<label><input type="radio" name="f" onclick="ev(\'q1\',\'final_\'+ '+i+')"> '+h.txt+'</label>').join(''):'<div class="muted">기록이 생기면 선택합니다.</div>')+'</div></div></div>');dbg('q1')}
function swap1(){let q=S.q1;tr();q.dir=q.dir==='ko'?'sw':'ko';q.hist.push({dir:q.dir==='sw'?'스와힐리어→한국어':'한국어→스와힐리어',txt:q.dir==='sw'?q.back:q.sw});ev('q1','language_swap');q1()}function edit1(v){let q=S.q1;if(q.dir==='ko'){q.src=v;ev('q1','source_edited');q1()}}function copy1(){let q=S.q1;q.clip=q.dir==='ko'?q.sw:q.back;ev('q1','copy_translation')}function save1(){ev('q1','save_translation')}function paste1(){let q=S.q1;if(q.clip){q.memo+=(q.memo?'\n':'')+q.clip;ev('q1','paste_to_memo');q1()}else ev('q1','paste_without_copy')}
function q2(){let q=S.q2;main.innerHTML=box('Canva에서 환영 카드 문구 다듬기','Canva Magic Write','<div class="chat"><div class="av">👧</div><div>카드 문구가 너무 길고 장난스러워 보여. 해외 교류 친구와 선생님도 함께 볼 카드라서 <b>더 공손하고 짧게</b> 고치고 싶어.</div></div>'+device('Canva','<div class="canva"><div class="rail"><button class="on">디자인</button><button>요소</button><button>텍스트</button><button>업로드</button></div><div class="stage"><div class="poster"><div class="photo"></div><div class="txt '+(q.sel?'sel':'')+'" onclick="sel2()">'+q.text+'</div></div></div><div class="panel"><h3>텍스트 도구</h3><button class="btn" onclick="magic2()">마법 글쓰기</button>'+(q.menu?'<div class="menu"><button onclick="rewrite2()">다시 쓰기</button><button onclick="short2()">짧게</button><button onclick="voice2()">문체 바꾸기</button><button onclick="fix2()">맞춤법 고치기</button></div>':'')+(q.voice?'<div class="menu"><button onclick="formal2()">더 격식 있게</button><button onclick="friendly2()">더 친근하게</button><button onclick="fun2()">더 재미있게</button></div>':'')+(q.pre?'<div class="preview"><b>미리보기</b><br>'+q.pre+'<br><br><button class="btn primary" onclick="apply2()">적용</button></div>':'')+'</div></div>'));dbg('q2')}
function sel2(){S.q2.sel=true;ev('q2','text_selected');q2()}function magic2(){S.q2.menu=true;ev('q2','magic_write_opened');q2()}function voice2(){S.q2.voice=true;ev('q2','change_voice_selected');q2()}function formal2(){S.q2.pre='우리 학교에 온 것을 진심으로 환영해요. 함께 좋은 추억을 만들어요.';ev('q2','more_formal_selected');q2()}function short2(){S.q2.pre='우리 학교에 온 것을 환영해요. 함께 좋은 추억을 만들어요.';ev('q2','shorten_selected');q2()}function rewrite2(){S.q2.pre='우리 학교에 와 줘서 고마워요. 즐거운 시간을 보내요.';ev('q2','rewrite_selected');q2()}function fix2(){S.q2.pre=S.q2.text.replace('!!!','!');ev('q2','fix_selected');q2()}function friendly2(){S.q2.pre='우리 학교에 와 줘서 반가워! 함께 추억을 만들자.';ev('q2','friendly_selected');q2()}function fun2(){S.q2.pre='오늘부터 환영 파티 시작! 신나게 추억을 만들자!';ev('q2','fun_selected');q2()}function apply2(){S.q2.text=S.q2.pre;ev('q2','apply_selected');q2()}
function q3(){let q=S.q3;main.innerHTML=box('Adobe Express에서 사진 편집하기','Adobe Express','<div class="chat"><div class="av">🧑</div><div>뒤쪽 안내문에 전화번호가 보이고, 바닥에 캔이 있어. <b>친구 얼굴과 환영 카드는 그대로 두고</b> 방해되는 부분만 없애고, 분위기도 조금 따뜻하게 보이면 좋겠어.</div></div>'+device('Adobe Express','<div class="adobe"><div class="stage"><div class="photo2" onclick="ev(\'q3\',\'image_selected\')"><div class="person maskable '+(q.mask.face?'masked':'')+'" onclick="mask3(event,\'face\')"></div><div class="sign maskable '+(q.mask.sign?'masked':'')+'" onclick="mask3(event,\'sign\')">WELCOME</div><div class="notice maskable '+(q.mask.notice?'masked':'')+'" onclick="mask3(event,\'notice\')">연락처<br>010-1234-5678</div><div class="can maskable '+(q.mask.can?'masked':'')+'" onclick="mask3(event,\'can\')"></div></div></div><div class="panel"><h3>이미지</h3><div class="menu"><button onclick="tool3(\'crop\')">자르기</button><button onclick="tool3(\'adjust\')">조정</button><button onclick="tool3(\'remove-bg\')">배경 제거</button><button onclick="tool3(\'remove-object\')">개체 제거</button></div>'+(q.tool==='remove-object'?'<p class="muted">브러시로 없앨 영역을 칠합니다.</p><button class="btn primary" onclick="remove3()">제거</button>':'')+(q.removed?'<h3>결과</h3><button class="result '+(q.result==='r1'?'on':'')+'" onclick="result3(\'r1\')">결과 1 · 얼굴이 어색함</button><button class="result '+(q.result==='r2'?'on':'')+'" onclick="result3(\'r2\')">결과 2 · 캔이 남아 있음</button><button class="result '+(q.result==='r3'?'on':'')+'" onclick="result3(\'r3\')">결과 3 · 전화번호와 캔이 사라지고 얼굴과 카드는 유지됨</button><button class="btn primary" onclick="keep3()">유지</button>':'')+(q.tool==='adjust'?'<h3>조정</h3><div class="warm"></div><label class="muted">따뜻함</label><input type="range" min="0" max="100" value="62" oninput="ev(\'q3\',\'warmth_adjusted\')"><br><button class="btn primary" onclick="ev(\'q3\',\'adjust_apply\')">적용</button>':'')+'</div></div>'));dbg('q3')}
function tool3(t){S.q3.tool=t;ev('q3','tool_'+t);q3()}function mask3(e,k){e.stopPropagation();if(S.q3.tool==='remove-object'){S.q3.mask[k]=!S.q3.mask[k];ev('q3','mask_'+k);q3()}else ev('q3','region_click_without_remove_'+k)}function remove3(){S.q3.removed=true;ev('q3','remove_clicked');q3()}function result3(r){S.q3.result=r;ev('q3','result_'+r);q3()}function keep3(){ev('q3','keep_clicked');q3()}
function route(){nav();let c=cur();if(c==='q1')q1();else if(c==='q2')q2();else if(c==='q3')q3();else home()}addEventListener('hashchange',route);route();
</script>
</body>
</html>
