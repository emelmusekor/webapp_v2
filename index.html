<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>AI 도구 기능형 3문항</title><style>
body{margin:0;background:#eef2f7;font-family:system-ui,'Noto Sans KR',sans-serif;color:#111827}.w{max-width:1180px;margin:auto;padding:18px;display:grid;grid-template-columns:220px 1fr;gap:14px}.s,.c,.app{background:#fff;border:1px solid #d8e0ee;border-radius:18px;box-shadow:0 10px 28px #0f172a18}.s{padding:14px;position:sticky;top:14px;height:calc(100vh - 28px)}a{display:block;margin:8px 0;padding:10px;border:1px solid #e5e7eb;border-radius:12px;text-decoration:none;color:#111827;font-weight:800}.on{background:#eff6ff;border-color:#2563eb!important;color:#1d4ed8}.c{padding:18px}.btn{border:1px solid #cbd5e1;background:white;border-radius:10px;padding:8px 10px;font-weight:800;cursor:pointer}.btn:hover{background:#f8fbff}.pri{background:#2563eb;color:white}.warn{background:#fff7ed;color:#9a3412}.talk,.msg{background:#f6f9ff;border:1px solid #d7e5ff;border-radius:14px;padding:12px;margin:12px 0}.msg{background:#fffdf6;border-color:#fde68a}.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.app{overflow:hidden}.bar{background:#f1f5f9;border-bottom:1px solid #d8e0ee;padding:10px;font-weight:900}.body{padding:12px}.box{border:1px solid #d8e0ee;border-radius:12px;margin:10px 0;overflow:hidden}.box h3{margin:0;background:#f8fafc;border-bottom:1px solid #e5e7eb;padding:8px;font-size:13px}.item,.box label{display:block;padding:8px;border-bottom:1px solid #eef2f7;font-size:13px}.done{display:none;background:#dcfce7;color:#166534;border:1px solid #86efac;border-radius:12px;padding:10px;margin:10px 0;font-weight:900}.show{display:block}.logs{border:1px solid #d8e0ee;border-radius:12px;margin-top:10px;overflow:hidden}.logs h3{margin:0;background:#f8fafc;padding:8px}.logs ol{margin:0;padding:8px 8px 8px 30px;min-height:38px}.logs li{font-size:13px}.empty{padding:9px;color:#94a3b8}.act{display:flex;justify-content:space-between;gap:8px;flex-wrap:wrap;margin-top:12px}.score{display:inline-block;background:#eef6ff;color:#1d4ed8;border:1px solid #c7ddff;border-radius:999px;padding:5px 9px;font-size:12px;font-weight:900;margin-left:6px}.gframe{background:#202124;border-radius:6px;color:#e8eaed;overflow:hidden;border:1px solid #3c4043}.gTop{display:grid;grid-template-columns:1fr 52px 1fr;gap:8px;padding:8px}.selBox{height:36px;border:1px solid #5f6368;border-radius:7px;display:flex;align-items:center;justify-content:space-between;padding:0 12px;color:#d2e3fc;font-weight:700;font-size:13px}.swapG{height:34px;border:0;background:transparent;color:#9aa0a6;font-size:22px}.gPane{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:0 8px 8px}.gCol{min-height:190px;background:#303134;border-radius:8px;padding:16px;position:relative}.gCol.src{background:#202124}.gMain{font-size:23px;line-height:1.25;white-space:pre-wrap}.roman{color:#bdc1c6;font-size:12px;margin-top:6px}.x{font-size:24px;color:#9aa0a6}.gBtns{position:absolute;left:14px;right:14px;bottom:12px;display:flex;gap:14px;align-items:center}.gIcon{border:0;background:transparent;color:#bdc1c6;font-size:22px;padding:4px;cursor:pointer}.gIcon.hit{color:#8ab4f8}.word{display:inline-block;border:1px solid #cbd5e1;border-radius:12px;padding:8px 10px;margin:5px;background:white;font-weight:850;cursor:pointer}.word.sel{border-color:#2563eb;outline:3px solid #2563eb22;background:#eff6ff}.hintLine{font-size:13px;color:#64748b}.stepBadge{display:inline-block;background:#111827;color:white;border-radius:999px;padding:4px 9px;font-size:12px;font-weight:900}.p{display:grid;grid-template-columns:1fr 1fr}.pane{padding:10px;min-height:140px}.pane+.pane{border-left:1px solid #e5e7eb}textarea{width:100%;min-height:90px;border:0;outline:0;resize:vertical;font:16px inherit}.out{white-space:pre-wrap}.cand{border:1px solid #e5e7eb;border-radius:12px;margin:8px;padding:8px}.sel{border-color:#2563eb!important;outline:3px solid #2563eb22}.chip{border:1px solid #d8e0ee;background:white;border-radius:999px;padding:7px 9px;margin:3px;font-weight:800;font-size:12px}.chip.on{background:#eff6ff;border-color:#2563eb;color:#1d4ed8}.img{display:grid;grid-template-columns:290px 1fr;border:1px solid #d8e0ee;border-radius:14px;overflow:hidden}.prompt{background:#f8fafc;border:1px solid #e5e7eb;border-radius:12px;min-height:70px;padding:9px}.cards{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:12px}.card{border:2px solid #e5e7eb;border-radius:14px;padding:8px;cursor:pointer}.art{height:110px;border-radius:10px;display:grid;place-items:center}.cap{font-size:12px;color:#475467}.ad{display:grid;grid-template-columns:1fr 260px;border:1px solid #d8e0ee;border-radius:14px;overflow:hidden;background:#e9edf5}.dark{background:#111827;color:white;display:flex;justify-content:space-between}.stage{display:grid;place-items:center;padding:18px}.photo{--w:.2;width:470px;height:300px;border:8px solid white;border-radius:20px;position:relative;background:linear-gradient(#bfdbfe 0 45%,#bbf7d0 46%);filter:sepia(var(--w)) saturate(calc(1 + var(--w))) brightness(calc(1 + var(--w)*.08))}.ov{position:absolute;inset:0;background:rgba(251,146,60,var(--w));mix-blend-mode:soft-light;border-radius:12px}.person{position:absolute;left:135px;bottom:55px;width:65px;height:108px;background:#60a5fa;border-radius:32px 32px 16px 16px}.person:before{content:"";position:absolute;width:42px;height:42px;border-radius:50%;background:#f8c7a5;left:11px;top:-26px}.sign{position:absolute;left:160px;right:110px;bottom:25px;height:42px;background:white;border:3px solid #f59e0b;border-radius:10px;display:grid;place-items:center;font-weight:900}.notice{position:absolute;right:35px;top:52px;background:white;border:3px solid #ef4444;border-radius:10px;padding:7px;font-size:12px;font-weight:900}.can{position:absolute;left:55px;bottom:30px;width:28px;height:40px;background:#ef4444;border:3px solid white;border-radius:8px}.masked{outline:5px solid #2563eb;box-shadow:0 0 0 9px #2563eb22}.removed{opacity:.08}.panel{background:white;padding:12px}.tool{display:grid;grid-template-columns:1fr 1fr;gap:6px}.res{display:block;width:100%;border:1px solid #d8e0ee;border-radius:10px;text-align:left;padding:8px;margin:6px 0;background:white}.warm{height:16px;border-radius:99px;background:linear-gradient(90deg,#bfdbfe,#fff7ed,#fed7aa);margin:8px 0}.snap{font-size:12px;background:#f8fafc;border:1px solid #e5e7eb;border-radius:10px;padding:8px;margin-top:8px}@media(max-width:900px){.w,.grid,.img,.ad,.p,.gPane{grid-template-columns:1fr}.s{position:relative;height:auto}.photo{width:100%}.cards{grid-template-columns:1fr}}
</style></head><body><div class="w"><aside class="s"><h2>AI 도구 기능형</h2><p>제출 후 상태와 행동이 저장됩니다.</p><nav id="nav"></nav><button id="all" class="btn warn">전체 초기화</button></aside><main id="main"></main></div><script>
const $=s=>document.querySelector(s),$$=s=>[...document.querySelectorAll(s)],P=[['home','안내'],['q1','번역 확인'],['q2','그림 생성'],['q3','사진 편집']],D={q1:()=>({e:[],sub:0,story:'번역 결과가 원래 뜻을 잘 담고 있는지 확인해 보세요.',step:1,score:0,swapped1:0,copied1:0,swapped2:0,word:''}),q2:()=>({e:[],sub:0,story:'상황에 맞는 조건을 골라야 해요.',opts:[],gen:0,sel:''}),q3:()=>({e:[],sub:0,story:'무엇을 지우고 남길지 판단해야 해요.',tool:'',mask:{notice:0,can:0,face:0,sign:0},removed:0,res:'',warm:20,snap:''})};let S={q1:D.q1(),q2:D.q2(),q3:D.q3()};function cur(){return location.hash.replace('#/','')||'home'}function nav(){let c=cur();$('#nav').innerHTML=P.map(p=>`<a class="${c==p[0]?'on':''}" href="#/${p[0]}">${p[1]}</a>`).join('')}function log(q,a,st){S[q].e.push(a);if(st)S[q].story=st;draw(q)}function draw(q){let l=$('#log');if(l)l.innerHTML=S[q].e.length?`<ol>${S[q].e.map(x=>`<li>${x}</li>`).join('')}</ol>`:'<div class="empty">아직 누른 행동이 없습니다.</div>'}function submit(q){S[q].sub=1;if(q==='q3')S.q3.snap=`제출 상태: 도구=${S.q3.tool||'없음'}, 결과=${S.q3.res||'없음'}, 따뜻함=${S.q3.warm}`;log(q,'문항 제출',q==='q3'?'현재 사진 상태로 제출되었습니다.':'문항이 제출되었습니다.');route()}function reset(q){S[q]=D[q]();route()}function shell(q,t,s,b){main.innerHTML=`<section class="c"><h2>${t}${q==='q1'?` <span class="score">점수 ${S.q1.score}/5</span>`:''}</h2><div class="sub">${s}</div>${b}<div class="msg">💬 ${S[q].story}</div><div class="done ${S[q].sub?'show':''}">제출되었습니다.</div><div class="logs"><h3>누른 행동 기록</h3><div id="log"></div></div><div class="act"><span><a class="btn" href="#/home">안내로</a> <button id="rst" class="btn warn">이 단계 초기화</button></span><button id="submit" class="btn pri">문항 제출</button></div></section>`;$('#rst').onclick=()=>reset(q);$('#submit').onclick=()=>submit(q);draw(q)}function home(){main.innerHTML='<section class="c"><h1>기능형 3문항 샘플</h1><p>대화 속 목표를 파악하고 실제 도구의 기능을 찾아 조작합니다.</p><p><a class="btn pri" href="#/q1">1번 시작</a> <a class="btn pri" href="#/q2">2번 시작</a> <a class="btn pri" href="#/q3">3번 시작</a></p></section>'}
function googleMock(step){let left='한국어',right='스와힐리어',lt='우리 학교에 오신 것을\n환영합니다.',rt='Karibu shuleni kwetu.',lr='uli haggyoe osin geos-eul hwan-yeonghabnida.',rr='';if(step===2){left='스와힐리어';right='한국어';lt='Karibu shuleni\nkwetu.';rt='저희 학교에 오신 것을\n환영합니다.';rr='jeohui haggyoe osin geos-eul hwan-yeonghabnida.'}if(step===3){lt='우리 학교에 오신 것을\n환영합니다. 친구야';rt='Karibu shuleni kwetu,\nrafiki yangu.';lr='uli haggyoe osin geos-eul hwan-yeonghabnida. chinguya.'}return`<div class="gframe"><div class="gTop"><div class="selBox">${left}<span>⌄</span></div><button id="swapBtn" class="swapG">↔</button><div class="selBox">${right}<span>⌄</span></div></div><div class="gPane"><div class="gCol src"><div class="gMain">${lt}<span class="x"> ×</span></div>${lr?`<div class="roman">${lr}</div>`:''}<div class="gBtns"><button class="gIcon">🎙</button><button class="gIcon">🔊</button></div></div><div class="gCol"><div class="gMain">${rt}</div>${rr?`<div class="roman">${rr}</div>`:''}<div class="gBtns"><button id="copyBtn" class="gIcon ${S.q1.copied1?'hit':''}">▣</button><button class="gIcon">🔊</button><button class="gIcon">G</button></div></div></div></div>`}
function q1(){let q=S.q1,guide='';if(q.step===1){guide=`<div class="talk">지수는 다른 나라 친구들에게 보여 줄 환영 문장을 AI 번역 도구로 스와힐리어로 번역하려고 합니다. 번역 결과가 원래 뜻을 잘 담고 있는지 확인하고, 더 알맞은 스와힐리어 번역을 선택하세요. (해당하는 버튼을 클릭하세요.)</div>${googleMock(1)}<div class="talk">“이 번역이 제대로 된 번역인지 알 수가 없네. 다시 한국어로 번역해서 확인하려면 어떤 버튼을 눌러야 하지? 그리고 일단, 스와힐리어 번역을 기록해둘까? 복사해두어야겠다.”</div><div class="box"><h3>답안 선택 방법</h3><div class="item">[언어 전환] 버튼과 [번역 복사] 버튼 클릭</div></div>${q.swapped1&&q.copied1?'<button id="next1" class="btn pri">다음</button>':''}`}else if(q.step===2){guide=`${googleMock(2)}<div class="talk">“역번역했더니 ‘우리 학교’가 ‘저희 학교’로 바뀌었네. 이번에는 친구라는 표현을 추가해보자. 한국어로 다시 번역하려면 어떤 버튼을 눌러야 하지?”</div><div class="box"><h3>답안 선택 방법</h3><div class="item">[언어 전환] 버튼 클릭</div></div>${q.swapped2?'<button id="next2" class="btn pri">다음</button>':''}`}else{guide=`${googleMock(3)}<div class="talk">“친구야를 추가했더니, 뭔가 문장이 바뀌었네. 이 중에 친구라는 표현은 어떤 것일까?”</div><div class="box"><h3>답안 선택 방법</h3><div class="item">Karibu, shuleni, kwetu, rafiki yangu 중 1개 클릭</div><div class="item"><button class="word ${q.word==='Karibu'?'sel':''}" data-word="Karibu">Karibu</button><button class="word ${q.word==='shuleni'?'sel':''}" data-word="shuleni">shuleni</button><button class="word ${q.word==='kwetu'?'sel':''}" data-word="kwetu">kwetu</button><button class="word ${q.word==='rafiki yangu'?'sel':''}" data-word="rafiki yangu">rafiki yangu</button></div></div>`}shell('q1','1. AI 번역 결과 확인하기','역번역, 복사, 입력 표현 추가, 단어 선택을 통해 번역 결과를 확인합니다.',guide);let addPoint=()=>{S.q1.score+=1};if($('#swapBtn'))$('#swapBtn').onclick=()=>{if(S.q1.step===1&&!S.q1.swapped1){S.q1.swapped1=1;addPoint();log('q1','역번역 버튼 선택 +1점','스와힐리어 번역을 다시 한국어로 확인했습니다.');q1()}else if(S.q1.step===2&&!S.q1.swapped2){S.q1.swapped2=1;addPoint();log('q1','한국어로 다시 번역하기 위한 언어 전환 버튼 선택 +1점','친구라는 표현을 추가한 새 문장으로 넘어갈 준비가 되었습니다.');q1()}else log('q1','언어 전환 버튼 클릭','이미 필요한 언어 전환을 했습니다.')};if($('#copyBtn'))$('#copyBtn').onclick=()=>{if(S.q1.step===1&&!S.q1.copied1){S.q1.copied1=1;addPoint();log('q1','번역 복사 버튼 선택 +1점','처음 스와힐리어 번역을 기록해 두었습니다.');q1()}else log('q1','번역 복사 버튼 클릭','이미 복사했습니다.')};if($('#next1'))$('#next1').onclick=()=>{S.q1.step=2;log('q1','다음 화면으로 이동','역번역 결과를 확인합니다.');q1()};if($('#next2'))$('#next2').onclick=()=>{S.q1.step=3;log('q1','친구야 표현 추가 후 다음 화면으로 이동','바뀐 스와힐리어 문장을 확인합니다.');q1()};$$('[data-word]').forEach(b=>b.onclick=()=>{if(!S.q1.word){S.q1.word=b.dataset.word;if(b.dataset.word==='rafiki yangu'){addPoint();log('q1','친구 표현 선택: rafiki yangu +1점','친구에 해당하는 표현을 찾았습니다.')}else log('q1','친구 표현 선택: '+b.dataset.word,'선택한 단어가 친구 표현인지 확인이 필요합니다.');q1()}})}
function q2(){let q=S.q2,opt=v=>`<button class="chip ${q.opts.includes(v)?'on':''}" data-o="${v}">${v}</button>`,ui=`<div class="img"><div style="background:#fff;border-right:1px solid #d8e0ee;padding:12px"><b>조건</b><div class="prompt">${['환영 앨범 표지 배경',...q.opts].join(', ')}</div><p>${['따뜻한 종이 콜라주','실제 얼굴 없음','글자 없음','정사각형','교실 환영 분위기','큰 국기와 민족 의상 강조','실제 학생 사진처럼'].map(opt).join('')}</p><button id="gen" class="btn pri">그림 생성</button></div><div><div class="bar" style="background:linear-gradient(90deg,#111827,#7c3aed);color:#fff">AI 그림 생성 결과</div>${q.gen?cards(q.sel):'<div class="empty">조건을 고르고 그림 생성 버튼을 누르면 결과가 나타납니다.</div>'}</div></div>`;shell('q2','2. 어울리는 그림 생성','조건을 여러 번 선택하고 알맞은 결과를 고릅니다.',`<div class="talk">👧 실제 친구 얼굴이나 읽을 수 있는 글자는 넣지 않고, 따뜻한 교실 분위기의 배경 그림이면 좋겠어.</div>${ui}`);$$('[data-o]').forEach(b=>b.onclick=()=>{let v=b.dataset.o;S.q2.opts=S.q2.opts.includes(v)?S.q2.opts.filter(x=>x!==v):[...S.q2.opts,v];log('q2','조건 선택: '+v,'조건을 선택했습니다. 목표와 맞는지 판단해야 합니다.');q2()});$('#gen').onclick=()=>{S.q2.gen=1;log('q2','그림 생성 버튼 누르기','그림 후보가 만들어졌습니다.');q2()};$$('[data-card]').forEach(c=>c.onclick=()=>{S.q2.sel=c.dataset.card;log('q2','생성 결과 '+c.dataset.card+' 선택',c.dataset.card==='2'?'목표에 가장 가까운 그림을 골랐습니다.':'조건과 맞는지 다시 살펴봐야 합니다.');q2()})}function cards(sel){return`<div class="cards"><div class="card ${sel==='1'?'sel':''}" data-card="1"><div class="art"><svg viewBox="0 0 200 140"><rect width="200" height="140" fill="#dbeafe"/><circle cx="58" cy="60" r="22" fill="#f8c7a5"/><text x="85" y="72" fill="#ef4444">WELC0M</text></svg></div><div class="cap">얼굴이 있고 글자가 깨져 보임</div></div><div class="card ${sel==='2'?'sel':''}" data-card="2"><div class="art"><svg viewBox="0 0 200 140"><rect width="200" height="140" fill="#fff7ed"/><circle cx="45" cy="45" r="24" fill="#fde68a"/><rect x="80" y="42" width="78" height="52" rx="12" fill="#bfdbfe"/></svg></div><div class="cap">글자·실제 얼굴 없이 따뜻한 교실 배경</div></div><div class="card ${sel==='3'?'sel':''}" data-card="3"><div class="art"><svg viewBox="0 0 200 140"><rect width="200" height="140" fill="#dcfce7"/><rect x="16" y="18" width="168" height="48" fill="#ef4444"/><rect x="16" y="66" width="168" height="48" fill="#2563eb"/></svg></div><div class="cap">큰 국기 느낌이 강함</div></div></div>`}
function q3(){let q=S.q3,w=q.warm/100,rm=q.res==='r3'?'removed':'',rem=q.tool==='remove'?'<button id="rem" class="btn pri">제거</button><p class="hintLine">브러시로 없앨 영역을 선택합니다.</p>':'',res=q.removed?`<button class="res ${q.res==='r1'?'sel':''}" data-r="r1">결과 1 · 얼굴이 어색함</button><button class="res ${q.res==='r2'?'sel':''}" data-r="r2">결과 2 · 캔이 남아 있음</button><button class="res ${q.res==='r3'?'sel':''}" data-r="r3">결과 3 · 전화번호와 캔이 사라지고 얼굴과 카드는 유지됨</button><button id="keep" class="btn pri">유지</button>`:'',adj=q.tool==='adjust'?`<div class="warm"></div><input id="warm" type="range" min="0" max="100" value="${q.warm}"><button id="adj" class="btn pri">적용</button>`:'';let ui=`<div class="ad"><div><div class="bar dark">Adobe Express <span>다운로드</span></div><div class="stage"><div id="photo" class="photo" style="--w:${w}"><div class="ov"></div><div id="face" class="person ${q.mask.face?'masked':''}"></div><div id="sign" class="sign ${q.mask.sign?'masked':''}">WELCOME</div><div id="notice" class="notice ${q.mask.notice?'masked':''} ${rm}">연락처<br>010-1234</div><div id="can" class="can ${q.mask.can?'masked':''} ${rm}"></div></div></div></div><div class="panel"><b>이미지</b><div class="tool"><button data-t="crop" class="btn">자르기</button><button data-t="adjust" class="btn">조정</button><button data-t="removeBg" class="btn">배경 제거</button><button data-t="remove" class="btn">개체 제거</button></div>${rem}${res}${adj}${q.snap?`<div class="snap">${q.snap}</div>`:''}</div></div>`;shell('q3','3. 현재 사진 상태로 제출','조정하면 사진이 실제로 바뀌고 제출 시 현재 상태가 저장됩니다.',`<div class="talk">🧑 전화번호 안내문과 캔만 없애고, 친구 얼굴과 환영 카드는 그대로 두고 싶어. 분위기도 따뜻하게 보이면 좋겠어.</div>${ui}`);$$('[data-t]').forEach(b=>b.onclick=()=>{S.q3.tool=b.dataset.t;log('q3','도구 선택: '+b.textContent,b.dataset.t==='adjust'?'따뜻함을 바꾸면 사진 색감이 실제로 바뀝니다.':b.dataset.t==='remove'?'개체 제거 도구를 열었습니다.':'도구를 선택했습니다.');q3()});['notice','can','face','sign'].forEach(id=>$('#'+id).onclick=e=>{e.stopPropagation();if(S.q3.tool==='remove'){S.q3.mask[id]=!S.q3.mask[id];log('q3','영역 선택: '+id,id==='notice'||id==='can'?'없애야 할 방해 요소를 선택했습니다.':'보존해야 할 영역을 선택했습니다.')}else log('q3','도구 없이 영역 클릭: '+id,'먼저 편집 도구를 골라야 합니다.');q3()});if($('#rem'))$('#rem').onclick=()=>{S.q3.removed=1;log('q3','제거 버튼 누르기','제거 결과 후보가 나타났습니다.');q3()};$$('[data-r]').forEach(b=>b.onclick=()=>{S.q3.res=b.dataset.r;log('q3','결과 선택: '+b.dataset.r,b.dataset.r==='r3'?'전화번호와 캔이 사라진 결과입니다.':'결과를 선택했습니다.');q3()});if($('#keep'))$('#keep').onclick=()=>log('q3','유지 버튼 누르기','선택한 제거 결과를 현재 사진 상태로 유지했습니다.');if($('#warm'))$('#warm').oninput=e=>{S.q3.warm=+e.target.value;$('#photo').style.setProperty('--w',S.q3.warm/100);log('q3','따뜻함 조정: '+S.q3.warm,'사진 색감이 실제로 바뀌었습니다.')};if($('#adj'))$('#adj').onclick=()=>log('q3','조정 적용','현재 색감 상태가 적용되었습니다.')}function route(){nav();let c=cur();if(c==='q1')q1();else if(c==='q2')q2();else if(c==='q3')q3();else home()}$('#all').onclick=()=>{S={q1:D.q1(),q2:D.q2(),q3:D.q3()};route()};addEventListener('hashchange',route);route();</script></body></html>
