<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>AI 도구 기능형 3문항</title><style>
*{box-sizing:border-box}body{margin:0;background:#eef2f7;font-family:system-ui,'Noto Sans KR',sans-serif;color:#111827}.wrap{max-width:1160px;margin:auto;padding:18px;display:grid;grid-template-columns:220px 1fr;gap:16px}.side,.card,.app{background:#fff;border:1px solid #d8e0ee;border-radius:18px;box-shadow:0 10px 30px #0f172a18}.side{padding:14px}.side h2{margin:0 0 8px}.side p,.muted{font-size:13px;color:#667085}.nav a{display:block;margin:8px 0;padding:10px;border:1px solid #e5e7eb;border-radius:12px;text-decoration:none;color:#111827;font-weight:800}.nav a.on{background:#eff6ff;border-color:#2563eb;color:#1d4ed8}.card{padding:18px;margin-bottom:14px}h1,h2{margin:0 0 8px}.talk{background:#f6f9ff;border:1px solid #d7e5ff;border-radius:14px;padding:12px;margin:12px 0}.btn{border:1px solid #cbd5e1;background:white;border-radius:10px;padding:8px 10px;font-weight:800;cursor:pointer}.btn:hover{background:#f8fbff}.pri{background:#2563eb;color:white;border-color:#2563eb}.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.app{overflow:hidden}.bar{padding:10px 12px;background:#f1f5f9;border-bottom:1px solid #d8e0ee;font-weight:900}.body{padding:12px}.debug{display:none;background:#0f172a;color:#dbeafe;border-radius:12px;padding:10px;white-space:pre-wrap;font:12px monospace}.debugOn .debug{display:block}.langs{text-align:center;border-bottom:1px solid #e5e7eb;padding:8px}.swap{width:40px;height:40px;border-radius:50%;font-size:20px}.panes{display:grid;grid-template-columns:1fr 1fr}.pane{padding:10px;min-height:145px}.pane+.pane{border-left:1px solid #e5e7eb}textarea{width:100%;min-height:96px;border:0;outline:0;resize:vertical;font:16px inherit}.out{font-size:16px;white-space:pre-wrap}.box{border:1px solid #d8e0ee;border-radius:12px;overflow:hidden;margin-bottom:10px}.box h3{margin:0;padding:8px;background:#f8fafc;border-bottom:1px solid #e5e7eb;font-size:13px}.item,.box label{display:block;padding:8px;border-bottom:1px solid #eef2f7;font-size:13px}.memo{background:#fffdf6}.canva,.adobe{display:grid;grid-template-columns:1fr 260px;border:1px solid #d8e0ee;border-radius:14px;overflow:hidden}.poster,.photo{height:300px;margin:18px;border-radius:20px;position:relative;background:linear-gradient(135deg,#dbeafe,#fff7ed);box-shadow:0 10px 25px #0f172a20}.text{position:absolute;left:24px;right:24px;bottom:24px;background:#ffffffdd;border:2px solid transparent;border-radius:12px;padding:10px;text-align:center;font-weight:900}.sel{border-color:#7c3aed!important}.panel{border-left:1px solid #d8e0ee;padding:12px}.menu button,.tool button,.result{display:block;width:100%;border:0;border-bottom:1px solid #eef2f7;background:white;text-align:left;padding:10px}.menu,.tool,.results{border:1px solid #e5e7eb;border-radius:12px;overflow:hidden;margin:8px 0}.photo{background:linear-gradient(#bfdbfe 0 45%,#bbf7d0 46%)}.person{position:absolute;left:130px;bottom:55px;width:68px;height:115px;background:#60a5fa;border-radius:34px 34px 18px 18px}.person:before{content:'';position:absolute;width:45px;height:45px;border-radius:50%;background:#f8c7a5;left:11px;top:-28px}.sign{position:absolute;left:150px;right:110px;bottom:25px;height:44px;background:white;border:3px solid #f59e0b;border-radius:10px;display:grid;place-items:center}.notice{position:absolute;right:36px;top:55px;background:white;border:3px solid #ef4444;border-radius:10px;padding:7px;font-weight:900;font-size:12px}.can{position:absolute;left:55px;bottom:30px;width:30px;height:42px;background:#ef4444;border:3px solid white;border-radius:8px}.masked{outline:5px solid #2563eb;box-shadow:0 0 0 9px #2563eb22}.warm{height:16px;border-radius:99px;background:linear-gradient(90deg,#bfdbfe,#fff7ed,#fed7aa);margin:8px 0}@media(max-width:850px){.wrap,.grid,.canva,.adobe,.panes{grid-template-columns:1fr}.panel{border-left:0}}
</style></head><body><div class="wrap"><aside class="side"><h2>AI 도구 기능형</h2><p>대화 속 목표를 파악하고 실제 기능을 찾아 조작합니다. 로그는 ?debug=1에서만 보입니다.</p><nav id="nav" class="nav"></nav></aside><main id="main"></main></div><script>
const debug=new URLSearchParams(location.search).has('debug');if(debug)document.body.classList.add('debugOn');
const S={q1:{e:[],dir:'ko',src:'우리 학교에서 함께 만든 추억을 오래 간직해요.',memo:'',hist:[],clip:''},q2:{e:[],sel:0,menu:0,voice:0,text:'우리 학교에 온 거 완전 신기하고 대박이야! 다 같이 엄청 재밌게 놀자!!!',pre:''},q3:{e:[],tool:'',mask:{notice:0,can:0,face:0,sign:0},removed:0,result:''}};
const pages=[['home','안내'],['q1','Google 번역'],['q2','Canva'],['q3','Adobe Express']], $=s=>document.querySelector(s);
function cur(){return location.hash.replace('#/','')||'home'}function nav(){let c=cur();$('#nav').innerHTML=pages.map(p=>`<a class="${c==p[0]?'on':''}" href="#/${p[0]}">${p[1]}</a>`).join('')}function log(q,e){S[q].e.push(e);dbg(q)}function dbg(q){let d=$('#dbg');if(d)d.textContent=JSON.stringify(S[q],null,2)}function shell(t,b,q){$('#main').innerHTML=`<section class="card"><h2>${t}</h2>${b}<pre id="dbg" class="debug"></pre><p><a class="btn" href="#/home">안내로</a> <button id="submit" class="btn pri">이 문항 제출</button></p></section>`;$('#submit').onclick=()=>log(q,'submit');dbg(q)}function app(n,b){return `<div class="app"><div class="bar">${n}</div><div class="body">${b}</div></div>`}function home(){$('#main').innerHTML='<section class="card"><h1>기능형 3문항 샘플</h1><p class="muted">캐릭터는 목표만 말합니다. 학생은 화면에서 필요한 기능을 찾아 조작합니다.</p><p><a class="btn pri" href="#/q1">1번 시작</a> <a class="btn pri" href="#/q2">2번 시작</a> <a class="btn pri" href="#/q3">3번 시작</a></p></section>'}
function tr(){let q=S.q1;if(q.src.includes('기억'))return ['Tukumbuke kumbukumbu tulizotengeneza pamoja shuleni kwetu.','우리 학교에서 함께 만든 추억을 기억해요.'];if(q.src.includes('오래')||q.src.includes('간직'))return ['Tuhifadhi kumbukumbu tulizotengeneza pamoja shuleni kwetu kwa muda mrefu.','우리 학교에서 만든 기억을 오랫동안 보관합시다.'];return ['Karibu shuleni kwetu.','우리 학교에 오신 것을 환영합니다.']}
function q1(){let q=S.q1,a=tr(),ko=q.dir=='ko',left=ko?'한국어':'스와힐리어',right=ko?'스와힐리어':'한국어',inp=ko?q.src:a[0],out=ko?a[0]:a[1],hist=q.hist.length?q.hist.map((h,i)=>`<div class="item"><b>${i+1}. ${h.d}</b><br>${h.t}</div>`).join(''):'<div class="item">기록 없음</div>',fin=q.hist.length?q.hist.map(h=>`<label><input type="radio" name="f"> ${h.t}</label>`).join(''):'<div class="item">기록이 생기면 선택합니다.</div>';
let google=app('Google 번역',`<div class="langs"><b>${left}</b> <button id="swap" class="swap" title="언어 전환">⇄</button> <b>${right}</b></div><div class="panes"><div class="pane"><b>입력</b><textarea id="src">${inp}</textarea></div><div class="pane"><b>번역 결과</b><div id="out" class="out">${out}</div><p><button id="copy" class="btn">복사</button></p></div></div><div class="box"><h3>최근 번역</h3>${hist}</div>`);
let memo=`<div class="box"><h3>메모장</h3><textarea id="memo" class="memo">${q.memo}</textarea><p><button id="paste" class="btn">붙여넣기</button></p></div><div class="box"><h3>최종 번역 선택</h3>${fin}</div>`;
shell('스와힐리어 번역 검증',`<div class="talk">스와힐리어 번역이 맞는지 모르겠어. 나중에 어떤 번역을 쓸지 비교할 수 있게 확인한 내용을 남겨두면 좋겠어.</div><div class="grid">${google}${memo}</div>`,'q1');$('#src').oninput=e=>{if(S.q1.dir=='ko'){S.q1.src=e.target.value;$('#out').textContent=tr()[0]}log('q1','edit')};$('#swap').onclick=()=>{let p=tr();S.q1.dir=S.q1.dir=='ko'?'sw':'ko';S.q1.hist.push({d:S.q1.dir=='sw'?'스와힐리어→한국어':'한국어→스와힐리어',t:S.q1.dir=='sw'?p[1]:p[0]});log('q1','swap');q1()};$('#copy').onclick=()=>{S.q1.clip=$('#out').textContent;log('q1','copy')};$('#memo').oninput=e=>{S.q1.memo=e.target.value;log('q1','memo')};$('#paste').onclick=()=>{if(S.q1.clip){S.q1.memo+=(S.q1.memo?'\n':'')+S.q1.clip;log('q1','paste');q1()}else log('q1','paste_empty')};document.querySelectorAll('input[name=f]').forEach(x=>x.onchange=()=>log('q1','final'))}
function q2(){let q=S.q2,menu=q.menu?'<div class="menu"><button id="rewrite">다시 쓰기</button><button id="short">짧게</button><button id="voice">문체 바꾸기</button><button id="fix">맞춤법 고치기</button></div>':'',voice=q.voice?'<div class="menu"><button id="formal">더 격식 있게</button><button id="friendly">더 친근하게</button><button id="fun">더 재미있게</button></div>':'',pre=q.pre?`<div class="talk">${q.pre}<p><button id="apply" class="btn pri">적용</button></p></div>`:'';
shell('Canva 문구 다듬기',`<div class="talk">카드 문구가 너무 길고 장난스러워 보여. 더 공손하고 짧게 고치고 싶어.</div>${app('Canva',`<div class="canva"><div><div class="poster"><p><button id="magic" class="btn">마법 글쓰기</button></p><div id="txt" class="text ${q.sel?'sel':''}">${q.text}</div></div></div><div class="panel"><b>텍스트 도구</b>${menu}${voice}${pre}</div></div>`)}`,'q2');$('#txt').onclick=()=>{S.q2.sel=1;log('q2','select');q2()};$('#magic').onclick=()=>{S.q2.menu=1;log('q2','magic');q2()};let b=id=>$('#'+id);if(b('voice'))b('voice').onclick=()=>{S.q2.voice=1;log('q2','voice');q2()};if(b('formal'))b('formal').onclick=()=>{S.q2.pre='우리 학교에 온 것을 진심으로 환영해요. 함께 좋은 추억을 만들어요.';log('q2','formal');q2()};if(b('short'))b('short').onclick=()=>{S.q2.pre='우리 학교에 온 것을 환영해요. 함께 좋은 추억을 만들어요.';log('q2','short');q2()};if(b('rewrite'))b('rewrite').onclick=()=>{S.q2.pre='우리 학교에 와 줘서 고마워요. 즐거운 시간을 보내요.';log('q2','rewrite');q2()};if(b('fix'))b('fix').onclick=()=>{S.q2.pre=S.q2.text.replace('!!!','!');log('q2','fix');q2()};if(b('friendly'))b('friendly').onclick=()=>{S.q2.pre='우리 학교에 와 줘서 반가워요. 함께 추억을 만들어요.';log('q2','friendly');q2()};if(b('fun'))b('fun').onclick=()=>{S.q2.pre='환영 파티 시작! 신나게 추억을 만들어요!';log('q2','fun');q2()};if(b('apply'))b('apply').onclick=()=>{S.q2.text=S.q2.pre;log('q2','apply');q2()}}
function q3(){let q=S.q3,tool='<div class="tool"><button data-t="crop">자르기</button><button data-t="adjust">조정</button><button data-t="removeBg">배경 제거</button><button data-t="remove">개체 제거</button></div>',remove=q.tool=='remove'?'<button id="remove" class="btn pri">제거</button>':'',res=q.removed?'<div class="results"><button class="result" data-r="r1">결과 1 · 얼굴이 어색함</button><button class="result" data-r="r2">결과 2 · 캔이 남아 있음</button><button class="result" data-r="r3">결과 3 · 전화번호와 캔이 사라지고 얼굴과 카드는 유지됨</button></div><button id="keep" class="btn pri">유지</button>':'',adj=q.tool=='adjust'?'<div class="warm"></div><input id="warm" type="range"><button id="adj" class="btn pri">적용</button>':'';
let photo=`<div class="photo"><div id="face" class="person ${q.mask.face?'masked':''}"></div><div id="sign" class="sign ${q.mask.sign?'masked':''}">WELCOME</div><div id="notice" class="notice ${q.mask.notice?'masked':''}">연락처<br>010-1234-5678</div><div id="can" class="can ${q.mask.can?'masked':''}"></div></div>`;shell('Adobe Express 사진 편집',`<div class="talk">전화번호 안내문과 캔만 없애고, 친구 얼굴과 환영 카드는 그대로 두고 싶어. 분위기도 따뜻하게 보이면 좋겠어.</div>${app('Adobe Express',`<div class="adobe"><div>${photo}</div><div class="panel">${tool}${remove}${res}${adj}</div></div>`)}`,'q3');document.querySelectorAll('[data-t]').forEach(x=>x.onclick=()=>{S.q3.tool=x.dataset.t;log('q3','tool_'+x.dataset.t);q3()});['notice','can','face','sign'].forEach(id=>$('#'+id).onclick=e=>{e.stopPropagation();if(S.q3.tool=='remove'){S.q3.mask[id]=!S.q3.mask[id];log('q3','mask_'+id);q3()}else log('q3','click_'+id)});if($('#remove'))$('#remove').onclick=()=>{S.q3.removed=1;log('q3','remove');q3()};document.querySelectorAll('[data-r]').forEach(x=>x.onclick=()=>{S.q3.result=x.dataset.r;log('q3','result_'+x.dataset.r);q3()});if($('#keep'))$('#keep').onclick=()=>log('q3','keep');if($('#warm'))$('#warm').oninput=()=>log('q3','warm');if($('#adj'))$('#adj').onclick=()=>log('q3','adjust_apply')}
function route(){nav();let c=cur();if(c=='q1')q1();else if(c=='q2')q2();else if(c=='q3')q3();else home()}addEventListener('hashchange',route);route();
</script></body></html>
