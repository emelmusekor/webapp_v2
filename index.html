<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>AI와 함께 준비하는 우리 반 교류 활동</title><style>*{box-sizing:border-box}body{margin:0;background:#eef2f7;font-family:system-ui,'Noto Sans KR',sans-serif;color:#111827}.w{max-width:1100px;margin:auto;padding:18px;display:grid;grid-template-columns:220px 1fr;gap:14px}.s,.c,.app{background:white;border:1px solid #d8e0ee;border-radius:18px;box-shadow:0 8px 24px #0f172a18}.s,.c{padding:14px}.brand{font-weight:900;font-size:18px}.nav a{display:block;margin:8px 0;padding:10px;border:1px solid #e5e7eb;border-radius:12px;color:#111827;text-decoration:none;font-weight:800}.on{background:#eff6ff!important;border-color:#2563eb!important;color:#1d4ed8!important}.hint,.sub,.mini{font-size:13px;color:#64748b}.btn{border:1px solid #cbd5e1;background:white;border-radius:10px;padding:8px 10px;font-weight:800;cursor:pointer;margin:3px}.pri{background:#2563eb;color:white;border-color:#2563eb}.warn{background:#fff7ed;color:#9a3412}.talk,.story{display:flex;gap:9px;background:#f6f9ff;border:1px solid #d7e5ff;border-radius:14px;padding:11px;margin:12px 0}.story{background:#fffdf6;border-color:#fde68a}.av{width:34px;height:34px;border-radius:11px;background:#dbeafe;display:grid;place-items:center;flex:0 0 auto}.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.app{overflow:hidden}.bar{background:#f1f5f9;border-bottom:1px solid #d8e0ee;padding:10px;font-weight:900}.body{padding:10px}.box{border:1px solid #d8e0ee;border-radius:12px;overflow:hidden;margin:8px 0;background:white}.box h3{margin:0;background:#f8fafc;border-bottom:1px solid #e5e7eb;padding:8px;font-size:13px}.item,.box label{display:block;padding:8px;border-bottom:1px solid #eef2f7;font-size:13px}.done{display:none;background:#dcfce7;border:1px solid #86efac;color:#166534;border-radius:12px;padding:10px;margin:10px 0;font-weight:900}.show{display:block}.logs{border:1px solid #d8e0ee;border-radius:12px;overflow:hidden;margin-top:10px}.logs h3{margin:0;background:#f8fafc;border-bottom:1px solid #e5e7eb;padding:8px;font-size:13px}.logs ol{margin:0;padding:8px 8px 8px 30px;min-height:38px}.empty{padding:9px;color:#94a3b8;font-size:13px}.act{display:flex;justify-content:space-between;gap:8px;flex-wrap:wrap}.chip,.res{border:1px solid #d8e0ee;background:white;border-radius:12px;padding:8px;margin:4px;font-size:13px;font-weight:800}.sel{border-color:#2563eb!important;outline:3px solid #2563eb22}.dark{background:#111827;color:white}.art{height:105px;border-radius:12px;background:linear-gradient(135deg,#fff7ed,#bfdbfe);margin:6px 0}.bad1{background:linear-gradient(135deg,#dbeafe,#fee2e2)}.bad2{background:linear-gradient(135deg,#dcfce7,#ef4444)}textarea{width:100%;min-height:80px;border:0;outline:0;resize:vertical}.photo{--w:.2;width:100%;height:260px;border:7px solid #fff;border-radius:18px;position:relative;background:linear-gradient(#bfdbfe 0 45%,#bbf7d0 46%);filter:sepia(var(--w)) saturate(calc(1 + var(--w)));box-shadow:0 10px 22px #0f172a22}.person{position:absolute;left:32%;bottom:58px;width:55px;height:90px;background:#60a5fa;border-radius:30px 30px 14px 14px}.person:before{content:'';position:absolute;width:38px;height:38px;border-radius:50%;background:#f8c7a5;left:9px;top:-25px}.sign{position:absolute;left:42%;right:18%;bottom:24px;height:38px;background:white;border:3px solid #f59e0b;border-radius:10px;display:grid;place-items:center}.notice{position:absolute;right:28px;top:42px;background:white;border:3px solid #ef4444;border-radius:10px;padding:6px;font-size:12px;font-weight:900}.can{position:absolute;left:45px;bottom:25px;width:26px;height:38px;background:#ef4444;border:3px solid white;border-radius:8px}.masked{outline:5px solid #2563eb}.removed{opacity:.08}.debug{display:none;background:#0f172a;color:#dbeafe;border-radius:12px;padding:10px;white-space:pre-wrap;font:12px monospace}.debugOn .debug{display:block}@media(max-width:850px){.w,.grid{grid-template-columns:1fr}}</style></head><body><div class="w"><aside class="s"><div class="brand">AI 리터러시 1~5단계</div><p class="hint">GitHub Pages용 단일 HTML입니다.</p><nav id="nav" class="nav"></nav><button class="btn warn" onclick="resetAll()">전체 초기화</button></aside><main id="m"></main></div><script>
if(location.search.includes('debug'))document.body.classList.add('debugOn');const T=['안내','1단계 번역 검증','2단계 그림 생성','3단계 사진 편집','4단계 문구 다듬기','5단계 공유 점검'];let P='home';function fresh(){return{1:{e:[],sub:0,msg:'아직 번역 결과를 확인하지 않았어요.',sw1:'Tuhifadhi kumbukumbu tulizotengeneza pamoja shuleni kwetu kwa muda mrefu.',b1:'',sw2:'',b2:'',sel:''},2:{e:[],sub:0,msg:'상황에 맞는 그림 조건을 골라야 해요.',o:[],gen:0,sel:''},3:{e:[],sub:0,msg:'무엇을 지우고 무엇을 남길지 판단해야 해요.',tool:'',mask:{notice:0,can:0},rem:0,res:'',warm:20,snap:''},4:{e:[],sub:0,msg:'문구를 선택하고 AI 글쓰기 기능으로 다듬어야 해요.',sel:0,pre:'',text:'우리 학교에 온 거 완전 신기하고 대박이야! 다 같이 엄청 재밌게 놀자!!!'},5:{e:[],sub:0,msg:'공유 전 개인정보와 공개 범위를 점검해야 해요.',c:[],r:'',snap:''}}}let S=fresh();function nav(){nav.innerHTML=T.map((t,i)=>i?`<a href="#${i}" class="${P==i?'on':''}">${t}</a>`:`<a href="#home" class="${P=='home'?'on':''}">안내</a>`).join('')}function app(n,b,c=''){return`<div class="app"><div class="bar ${c}">${n}</div><div class="body">${b}</div></div>`}function rec(i,a,msg){S[i].e.push(a);if(msg)S[i].msg=msg;render()}function logs(i){return`<div class="story"><div class="av">💬</div><div>${S[i].msg}</div></div><div class="done ${S[i].sub?'show':''}">제출되었습니다.</div><div class="logs"><h3>누른 행동 기록</h3>${S[i].e.length?'<ol>'+S[i].e.map(x=>`<li>${x}</li>`).join('')+'</ol>':'<div class="empty">아직 누른 행동이 없습니다.</div>'}</div><pre class="debug">${JSON.stringify(S[i],null,2)}</pre><div class="act"><span><a class="btn" href="#home">안내로</a><button class="btn warn" onclick="reset(${i})">이 단계 초기화</button></span><button class="btn pri" onclick="submit(${i})">문항 제출</button></div>`}function frame(i,sub,body){m.innerHTML=`<section class="c"><h2>${T[i]}</h2><p class="sub">${sub}</p>${body}${logs(i)}</section>`}function submit(i){S[i].sub=1;if(i==3)S[3].snap=`제출 상태: 결과=${S[3].res||'없음'}, 따뜻함=${S[3].warm}`;if(i==5)S[5].snap=`제출 상태: 점검=${S[5].c.join(', ')||'없음'}, 범위=${S[5].r||'없음'}`;rec(i,'문항 제출','문항이 제출되었습니다.')}function reset(i){S[i]=fresh()[i];render()}function resetAll(){S=fresh();render()}function home(){m.innerHTML=`<section class="c"><h1>AI와 함께 준비하는 우리 반 교류 활동</h1><p class="sub">1~5단계로 AI 도구 기능을 조작하며 환영 앨범을 완성합니다.</p>${[1,2,3,4,5].map(i=>`<a class="btn pri" href="#${i}">${i}단계</a>`).join(' ')}</section>`}
function q1(){let s=S[1];frame(1,'역번역과 다시 역번역으로 두 스와힐리어 번역을 비교합니다.',`<div class="talk"><div class="av">🧒</div><div>스와힐리어 번역이 맞는지 모르겠어. 더 나은 한글 문장으로 다시 번역한 뒤 최종 번역을 고르고 싶어.</div></div><div class="grid">${app('번역 도구',`<div class="box"><h3>스와힐리어 번역 1</h3><div class="item">${s.sw1}</div><div class="item"><button class="btn" onclick="S[1].b1='우리 학교에서 만든 기억을 오랫동안 보관합시다.';rec(1,'역번역 버튼 누르기','처음 번역은 의미가 조금 어색합니다.')">역번역</button></div></div><div class="box"><h3>역번역 결과</h3><div class="item">${s.b1||'아직 없음'}</div></div><div class="box"><h3>한글 다시 쓰기</h3><div class="item">우리 학교에서 함께 만든 추억을 기억해요.<br><button class="btn" onclick="S[1].sw2='Tukumbuke kumbukumbu tulizotengeneza pamoja shuleni kwetu.';rec(1,'한글 다시 쓰기 내용 붙여넣기','두 번째 번역이 만들어졌습니다.')">한글 다시 쓰기 내용 붙여넣기</button></div></div>${s.sw2?`<div class="box"><h3>스와힐리어 번역 2</h3><div class="item">${s.sw2}</div><div class="item"><button class="btn" onclick="S[1].b2='우리 학교에서 함께 만든 추억을 기억해요.';rec(1,'다시 역번역 버튼 누르기','두 번째 번역은 뜻이 더 잘 유지됩니다.')">다시 역번역</button></div></div>`:''}`)}${app('최종 선택',`<div class="card2 ${s.sel=='first'?'sel':''}" onclick="S[1].sel='first';rec(1,'번역 1 선택','번역 1을 최종 후보로 골랐습니다.')">번역 1<br>${s.sw1}</div>${s.sw2?`<div class="card2 ${s.sel=='second'?'sel':''}" onclick="S[1].sel='second';rec(1,'번역 2 선택','번역 2를 최종 후보로 골랐습니다.')">번역 2<br>${s.sw2}</div>`:'<div class="empty">번역 2가 아직 없습니다.</div>'}`)}</div>`) }
function q2(){let s=S[2],opts=['따뜻한 종이 콜라주','실제 얼굴 없음','글자 없음','정사각형','교실 환영 분위기','큰 국기 강조','실제 학생 사진처럼'];frame(2,'상황에 맞는 생성 조건을 여러 번 선택하고 알맞은 결과를 고릅니다.',`<div class="talk"><div class="av">👧</div><div>앨범 표지에 어울리는 그림이 필요해. 실제 얼굴이나 읽을 수 있는 글자는 넣지 않고 따뜻한 교실 분위기면 좋겠어.</div></div><div class="grid">${app('AI 그림 생성 조건',`<div class="box"><h3>프롬프트</h3><div class="item">환영 앨범 표지 배경, ${s.o.join(', ')}</div></div>${opts.map(o=>`<button class="chip ${s.o.includes(o)?'on':''}" onclick="S[2].o=S[2].o.includes('${o}')?S[2].o.filter(x=>x!='${o}'):[...S[2].o,'${o}'];rec(2,'조건 선택: ${o}','조건을 선택했습니다.')">${o}</button>`).join('')}<p><button class="btn pri" onclick="S[2].gen=1;rec(2,'그림 생성 버튼 누르기','조건에 따른 후보가 생성되었습니다.')">그림 생성</button></p>`)}${app('생성 결과',s.gen?`<div class="cards"><div class="gen bad1 ${s.sel==1?'on':''}" onclick="S[2].sel=1;rec(2,'결과 1 선택','얼굴과 깨진 글자가 있어 다시 볼 필요가 있습니다.')"><div class="art">얼굴+깨진 글자</div><div class="cap">부적절</div></div><div class="gen ${s.sel==2?'on':''}" onclick="S[2].sel=2;rec(2,'결과 2 선택','목표에 가장 가까운 그림을 골랐습니다.')"><div class="art">따뜻한 교실 배경</div><div class="cap">적절</div></div><div class="gen bad2 ${s.sel==3?'on':''}" onclick="S[2].sel=3;rec(2,'결과 3 선택','국기 느낌이 너무 강합니다.')"><div class="art">큰 국기</div><div class="cap">재검토</div></div></div>`:'<div class="empty">아직 생성하지 않았습니다.</div>')}</div>`) }
function q3(){let s=S[3],rm=s.res=='r3'?'removed':'',res=s.rem?`<button class="res ${s.res=='r1'?'sel':''}" onclick="S[3].res='r1';rec(3,'결과 1 선택','얼굴이 어색합니다.')">결과 1 · 얼굴 어색</button><button class="res ${s.res=='r2'?'sel':''}" onclick="S[3].res='r2';rec(3,'결과 2 선택','캔이 남아 있습니다.')">결과 2 · 캔 남음</button><button class="res ${s.res=='r3'?'sel':''}" onclick="S[3].res='r3';rec(3,'결과 3 선택','필요한 것만 제거됐습니다.')">결과 3 · 전화번호와 캔 제거</button><button class="btn pri" onclick="rec(3,'유지 버튼 누르기','현재 제거 결과를 유지했습니다.')">유지</button>`:'';frame(3,'조정하면 사진이 실제로 바뀌고 제출 시 현재 상태가 저장됩니다.',`<div class="talk"><div class="av">🧑</div><div>전화번호 안내문과 캔만 없애고, 친구 얼굴과 환영 카드는 그대로 두고 싶어. 분위기도 따뜻하게 보이면 좋겠어.</div></div><div class="adobe"><div><div class="bar dark">Adobe Express</div><div class="body"><div id="photo" class="photo" style="--w:${s.warm/100}"><div class="person"></div><div class="sign">WELCOME</div><div class="notice ${s.mask.notice?'masked':''} ${rm}" onclick="if(S[3].tool=='remove'){S[3].mask.notice=!S[3].mask.notice;rec(3,'영역 선택: 전화번호','지워야 할 영역을 골랐습니다.')}else rec(3,'도구 없이 전화번호 클릭','먼저 개체 제거 도구를 골라야 합니다.')">연락처<br>010-1234</div><div class="can ${s.mask.can?'masked':''} ${rm}" onclick="if(S[3].tool=='remove'){S[3].mask.can=!S[3].mask.can;rec(3,'영역 선택: 캔','지워야 할 영역을 골랐습니다.')}else rec(3,'도구 없이 캔 클릭','먼저 개체 제거 도구를 골라야 합니다.')"></div></div></div></div><div class="body"><button class="btn" onclick="S[3].tool='remove';rec(3,'개체 제거 도구 선택','없앨 부분만 선택합니다.')">개체 제거</button><button class="btn" onclick="S[3].tool='adjust';rec(3,'조정 도구 선택','따뜻함을 바꾸면 사진 색감이 변합니다.')">조정</button><button class="btn pri" onclick="S[3].rem=1;rec(3,'제거 버튼 누르기','제거 결과 후보가 나타났습니다.')">제거</button>${res}<div class="warm"></div><input id="warm" type="range" min="0" max="100" value="${s.warm}" oninput="S[3].warm=+this.value;photo.style.setProperty('--w',S[3].warm/100);rec(3,'따뜻함 조정: '+S[3].warm,'사진 색감이 실제로 바뀌었습니다.')"><button class="btn pri" onclick="rec(3,'조정 적용','현재 색감 상태가 적용되었습니다.')">적용</button>${s.snap?`<div class="item">${s.snap}</div>`:''}</div></div>`) }
function q4(){let s=S[4];frame(4,'문구를 선택하고 AI 글쓰기 기능으로 더 짧고 공손하게 다듬습니다.',`<div class="talk"><div class="av">👧</div><div>카드 문구가 너무 길고 장난스러워 보여. 선생님과 친구들이 함께 볼 수 있게 짧고 공손하게 고치고 싶어.</div></div><div class="grid">${app('Canva 카드',`<div class="art"><div class="item ${s.sel?'sel':''}" onclick="S[4].sel=1;rec(4,'텍스트 선택','수정할 문구를 선택했습니다.')">${s.text}</div></div>`)}${app('텍스트 도구',`<button class="btn" onclick="rec(4,'마법 글쓰기 열기','AI 글쓰기 기능을 열었습니다.')">마법 글쓰기</button><button class="btn" onclick="S[4].pre='우리 학교에 온 것을 환영해요. 함께 좋은 추억을 만들어요.';rec(4,'더 공손하게 선택','공손한 문구가 제안되었습니다.')">더 공손하게</button><button class="btn" onclick="S[4].pre='환영해요. 함께 좋은 추억을 만들어요.';rec(4,'짧게 선택','짧은 문구가 제안되었습니다.')">짧게</button><div class="box"><h3>AI 제안</h3><div class="item">${s.pre||'아직 없음'}</div></div><button class="btn pri" onclick="if(S[4].pre){S[4].text=S[4].pre;rec(4,'AI 제안 적용','카드 문구에 적용했습니다.')}else rec(4,'빈 제안 적용 시도','먼저 문구를 제안받아야 합니다.')">적용</button>`)}</div>`) }
function q5(){let s=S[5],cs=['친구 사진 사용 동의 확인','전화번호 같은 개인정보 없음','놀림이나 차별 표현 없음','출처와 만든 과정 설명 가능'];frame(5,'앨범을 공유하기 전에 개인정보·표현·공개 범위를 확인합니다.',`<div class="talk"><div class="av">🧑</div><div>완성한 앨범을 공유하기 전에 사진 사용, 개인정보, 표현, 공개 범위를 다시 확인하고 싶어.</div></div><div class="grid">${app('공유 전 체크리스트',cs.map(c=>`<label><input type="checkbox" ${s.c.includes(c)?'checked':''} onchange="S[5].c=this.checked?[...S[5].c,'${c}']:S[5].c.filter(x=>x!='${c}');rec(5,'점검: ${c}','공유 전 확인 항목을 기록했습니다.')"> ${c}</label>`).join(''))}${app('공개 범위',`<button class="res ${s.r=='class'?'sel':''}" onclick="S[5].r='class';rec(5,'공개 범위: 우리 반만','공유 범위를 제한했습니다.')">우리 반만 보기</button><button class="res ${s.r=='school'?'sel':''}" onclick="S[5].r='school';rec(5,'공개 범위: 학교 안','학교 안으로 제한했습니다.')">학교 안에서 보기</button><button class="res ${s.r=='public'?'sel':''}" onclick="S[5].r='public';rec(5,'공개 범위: 전체 공개','전체 공개는 더 신중해야 합니다.')">전체 공개</button>${s.snap?`<div class="item">${s.snap}</div>`:''}`)}</div>`) }
function render(){P=location.hash.replace('#','')||'home';nav();if(P==1)q1();else if(P==2)q2();else if(P==3)q3();else if(P==4)q4();else if(P==5)q5();else home()}addEventListener('hashchange',render);render();function selftest(){try{[1,2,3,4,5].forEach(i=>{location.hash='#'+i;render();if(!m.textContent.includes(i+'단계'))throw Error('step'+i)});document.body.dataset.selftest='all pass'}catch(e){document.body.dataset.selftest='fail '+e.message}}if(location.search.includes('selftest'))setTimeout(selftest,50)</script></body></html>
